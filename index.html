function safeGet(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch(e){localStorage.removeItem(k);return f}}
let learner=localStorage.getItem('tmb_learner')||'',style=localStorage.getItem('tmb_style')||'',lesson='alphabet',index=0,answer=[],stats=safeGet('tmb_stats',{score:0,attempts:0}),done=safeGet('tmb_done',{alphabet:[],root:[],meaning:[],plural:[],accusative:[],mutation:[],motion:[]});
function lang(){return learner==='ayza'?'id':'en'}function T(k){return UI[lang()][k]}function text(o){return lang()==='id'?o.idn:o.en}function set(id,v){document.getElementById(id).textContent=v}function show(id){document.getElementById(id).classList.remove('hidden')}function hide(id){document.getElementById(id).classList.add('hidden')}
function chooseLearner(x){learner=x;localStorage.setItem('tmb_learner',x);if(!style){style='family';localStorage.setItem('tmb_style',style)}renderStart()}function setStyle(x){style=x;localStorage.setItem('tmb_style',x);renderStart()}
function renderStart(){set('subtitle',learner?T('subtitle'):'Choose your learner profile first / Pilih profil pengguna terlebih dahulu');set('chooseTitle',learner?T('choose'):'Choose learner / Pilih pengguna');if(!learner){hide('styleArea');return}show('styleArea');set('styleTitle',T('style'));set('continueBtn',T('continue'));const l=[['family',T('family'),T('familyDesc')],['kids',T('kids'),T('kidsDesc')],['adult',T('adult'),T('adultDesc')]];document.getElementById('styleList').innerHTML=l.map(x=>`<div class="style-card ${style===x[0]?'active':''}" onclick="setStyle('${x[0]}')"><div class="style-title">${x[1]}</div><div class="style-desc">${x[2]}</div></div>`).join('')}
function showStart(){show('startPage');hide('homePage');hide('lessonPage');renderStart()}function showHome(){show('homePage');hide('startPage');hide('lessonPage');set('subtitle',T('subtitle'));set('changeBtn',T('change'));set('resetBtn',T('reset'));set('homeTitle',(learner==='ayza'?'Ayza — ':'Bella — ')+T('home'));set('positioning',T('positioning'));set('scoreLabel',T('score'));set('practiceLabel',T('practice'));set('accuracyLabel',T('accuracy'));set('pathTitle',T('path'));document.getElementById('modeInfo').innerHTML=`<span class="mode-pill">${learner==='ayza'?'Bahasa Indonesia':'English'}</span><span class="mode-pill">${T(style)}</span>`+layaHomeCard();renderPath();updateStats()}
function allLessons(){return [['alphabet','🔤',T('alphabet'),T('alphabetDesc'),ALPHABET.length],['root','🌱',T('root'),T('rootDesc'),ROOTS.length],['meaning','🧩',T('meaning'),T('meaningDesc'),MEANINGS.length],['plural','🔢',T('plural'),T('pluralDesc'),PLURALS.length],['accusative','🎯',T('accusative'),T('accusativeDesc'),ACCUSATIVES.length],['mutation','🔄',T('mutation'),T('mutationDesc'),MUTATIONS.length],['motion','➡️',T('motion'),T('motionDesc'),MOTIONS.length]]}
function renderPath(){document.getElementById('pathBox').innerHTML=allLessons().map(x=>{const pct=Math.min(100,Math.round(((done[x[0]]||[]).length/x[4])*100));return `<div class="path-card ${pct===100?'done':''}"><div class="path-title">${x[1]} ${x[2]}</div><div class="path-desc">${x[3]}</div><span class="mode-pill">${pct===100?T('done'):T('now')}</span><span class="mode-pill">${pct}%</span><div class="progress"><div class="bar" style="width:${pct}%"></div></div><button class="primary" style="width:100%;margin-top:12px" onclick="openLesson('${x[0]}')">${T('open')}</button></div>`}).join('')}
function updateStats(){const total=allLessons().reduce((a,x)=>a+x[4],0);const completed=Object.values(done).reduce((a,b)=>a+(Array.isArray(b)?b.length:0),0);const pct=Math.min(100,Math.round(completed/total*100));const acc=stats.attempts?Math.round(stats.score/stats.attempts*100):0;set('score',stats.score);set('attempts',stats.attempts);set('accuracy',acc+'%');document.getElementById('bar').style.width=pct+'%'}
function getList(){return lesson==='alphabet'?ALPHABET:lesson==='root'?ROOTS:lesson==='meaning'?MEANINGS:lesson==='plural'?PLURALS:lesson==='accusative'?ACCUSATIVES:lesson==='mutation'?MUTATIONS:MOTIONS}
function openLesson(x){lesson=x;index=0;hide('homePage');hide('startPage');show('lessonPage');renderLesson()}function navLabels(){set('prevBtn',T('previous'));set('prevBtn2',T('previous'));set('menuBtn',T('menu'));const last=index>=getList().length-1;set('nextBtn',last?T('finish'):T('next'));set('nextBtn2',last?T('finish'):T('next'));document.getElementById('prevBtn').disabled=index===0;document.getElementById('prevBtn2').disabled=index===0}function prevItem(){if(index>0){index--;renderLesson()}}function nextItem(){if(index<getList().length-1){index++;renderLesson()}else showHome()}
function updateLessonBar(){const list=getList();const current=Math.min(list.length,index+1);const pagePct=Math.min(100,Math.round((current/list.length)*100));const completed=(done[lesson]||[]).length;const completedPct=Math.min(100,Math.round((completed/list.length)*100));const bar=document.getElementById('lessonBar');if(bar)bar.style.width=pagePct+'%';const txt=document.getElementById('lessonProgressText');if(txt)txt.textContent='Page progress: '+current+' / '+list.length+' ('+pagePct+'%)  |  Completed: '+completed+' / '+list.length+' ('+completedPct+'%)'}
function renderLesson(){navLabels();set('counter',T('item')(index+1,getList().length));if(lesson==='alphabet'){renderAlphabet();updateLessonBar();return}if(lesson==='root'){renderRoot();updateLessonBar();return}renderBuilder();updateLessonBar()}
function playAudio(file){if(!file){return false}const a=new Audio(file);a.onerror=()=>showAudio(`${T('missing')} (${file})`);a.play().catch(()=>showAudio(`${T('missing')} (${file})`));return true}function showAudio(msg){const box=document.getElementById('audioMessage');if(box){box.textContent=msg;box.classList.remove('hidden')}else alert(msg)}function getTurkishVoice(){if(!('speechSynthesis' in window))return null;const voices=speechSynthesis.getVoices?speechSynthesis.getVoices():[];return voices.find(v=>String(v.lang).toLowerCase().startsWith('tr'))||voices.find(v=>String(v.name).toLowerCase().includes('turkish'))||null}function speak(x){if(!('speechSynthesis' in window)){showAudio('Speech synthesis is not supported in this browser.');return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(x);u.lang='tr-TR';u.rate=.68;u.pitch=1;const voice=getTurkishVoice();if(voice)u.voice=voice;speechSynthesis.speak(u)}function playWord(item){if(item&&item.audio){playAudio(item.audio);return}if(item&&item.result){speak(item.result);showAudio('TTS fallback used for: '+item.result)}else if(typeof item==='string'){speak(item);showAudio('TTS fallback used for: '+item)}}
function saveProgress(){localStorage.setItem('tmb_done',JSON.stringify(done));localStorage.setItem('tmb_stats',JSON.stringify(stats))}function mark(type,id){if(!done[type])done[type]=[];stats.attempts++;if(!done[type].includes(id)){done[type].push(id);stats.score++}saveProgress();updateStats();updateLessonBar();showAudio('Marked. Progress updated.')}
function renderAlphabet(){const item=ALPHABET[index];set('lessonTitle',T('alphabet'));const soft=item.softG?`<div class="topic-example"><b>${T('softGTitle')}</b><br>${T('softGNote')}</div>`:'';const topic=topicSection(`<div class="topic-example">${lang()==='id'?item.hint_id:item.hint_en}<br><b>${item.contrast}</b></div>${soft}`);const practice=practiceSection(`<div class="big">${item.letter}</div><div class="meaning">${item.word} = ${text(item)}</div><div class="row"><button class="primary" onclick="playAudio('${item.main}')">${T('listenMain')}: ${item.mainLabel||item.letter}</button><button class="primary" onclick="playAudio('${item.example}')">${T('listenExample')}: ${item.exampleLabel||item.word}</button></div><div class="row"><button class="purple" onclick="playAudio('${item.contrastAudio}')">${T('listenContrast')}: ${item.contrastLabel}</button><button class="success" onclick="mark('alphabet','${item.id}')">${T('know')}</button></div><div id="audioMessage" class="audio-note hidden"></div><div class="audio-note">Required files for this page:<br>${item.main}<br>${item.example}<br>${item.contrastAudio}</div>`);document.getElementById('activity').innerHTML=topic+practice}
function renderRoot(){const item=ROOTS[index];set('lessonTitle',T('root'));const topic=topicSection(`<div class="topic-example">${esc(item.root)} → ${text(item)}</div>`);const practice=practiceSection(`<div class="big">${item.root}</div><div class="meaning">${text(item)}</div><div class="logic">${T('rootNote')}</div><div class="row"><button class="primary" onclick="playWord({result:'${item.root}',audio:'${item.audio}'})">${T('listen')}</button><button class="success" onclick="mark('root','${item.id}')">${T('know')}</button></div><div id="audioMessage" class="audio-note hidden"></div><div class="audio-note">Audio file:<br>${item.audio}</div>`);document.getElementById('activity').innerHTML=topic+practice}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function L(en,id){return lang()==='id'?id:en}
const LAYA_IMG='./assets/laya_dolphin_3d.png?v=12';
function isKids(){return style==='kids'}
function layaLine(){return L('Hi, I am Laya. I will help you build Turkish words piece by piece.','Hai, aku Laya. Aku akan membantu kamu menyusun kata Turki bagian demi bagian.')}
function layaTopicLine(){const m={alphabet:L('Listen first. Turkish letters are friendly when you hear them clearly.','Dengar dulu. Huruf Turki lebih mudah jika kamu mendengarnya dengan jelas.'),root:L('This is the root. We start small, then we grow the word.','Ini akar kata. Kita mulai kecil, lalu kata itu tumbuh.'),meaning:L('Let us build meaning: root first, then the suffixes in order.','Mari susun makna: akar dulu, lalu akhiran berurutan.'),plural:L('One becomes many with -ler or -lar. Listen to the sound.','Satu menjadi banyak dengan -ler atau -lar. Dengarkan bunyinya.'),accusative:L('This suffix shows a specific object. Build it carefully.','Akhiran ini menunjukkan objek tertentu. Susun dengan hati-hati.'),mutation:L('Some words change sound to become easier to say. Watch the last letter.','Beberapa kata berubah bunyi agar lebih mudah diucapkan. Perhatikan huruf terakhir.'),motion:L('This suffix shows direction: going to a place.','Akhiran ini menunjukkan arah: pergi ke suatu tempat.')};return m[lesson]||layaLine()}
function layaHomeCard(){return isKids()?`<div class="laya-home"><img src="${LAYA_IMG}" alt="Laya dolphin mascot" onerror="this.onerror=null;this.src='assets/laya_dolphin_3d.png';"><div class="laya-text">${layaLine()}<br><span class="kids-only-badge">Kids Mode Guide</span></div></div>`:''}
function layaTopicCard(){return isKids()?`<div class="laya-topic"><img src="${LAYA_IMG}" alt="Laya dolphin mascot" onerror="this.onerror=null;this.src='assets/laya_dolphin_3d.png';"><div class="laya-bubble">${layaTopicLine()}</div></div>`:''}
function sectionBlock(title,body,kind){return `<div class="section-card ${kind||''}"><div class="section-title">${title}</div>${body}</div>`}
function topicText(){
  const data={
    alphabet:{en:'Turkish letters are normally consistent. The same letter usually keeps the same sound. First listen to the main sound, then the example word, then the contrast sound.',id:'Huruf Turki biasanya konsisten. Huruf yang sama biasanya memiliki bunyi yang sama. Dengarkan bunyi utama, contoh kata, lalu bunyi pembanding.'},
    root:{en:'A root word is the base. Turkish builds meaning by adding suffixes after the root. Learn the root sound first before adding endings.',id:'Akar kata adalah dasar. Bahasa Turki membangun makna dengan menambahkan akhiran setelah akar. Pelajari bunyi akar dulu sebelum menambahkan akhiran.'},
    meaning:{en:'In Turkish, one word can carry several meanings. Build from left to right: root first, then the suffixes. The order is important.',id:'Dalam bahasa Turki, satu kata bisa membawa beberapa makna. Susun dari kiri ke kanan: akar dulu, lalu akhiran. Urutannya penting.'},
    plural:{en:'Plural words use -ler or -lar. The correct suffix depends on vowel harmony. Do not guess only by English meaning; listen to the Turkish sound.',id:'Kata jamak memakai -ler atau -lar. Akhiran yang benar bergantung pada harmoni vokal. Jangan menebak hanya dari arti bahasa Inggris; dengarkan bunyi Turki.'},
    accusative:{en:'This topic marks a specific object: the apple, the newspaper, the milk. Turkish adds an object suffix after the root.',id:'Topik ini menandai objek tertentu: apel itu, koran itu, susu itu. Bahasa Turki menambahkan akhiran objek setelah akar.'},
    mutation:{en:'Some root words change sound before a vowel suffix. This is a pronunciation helper, not a new root. Watch the final consonant carefully.',id:'Beberapa akar kata berubah bunyi sebelum akhiran vokal. Ini membantu pengucapan, bukan akar baru. Perhatikan konsonan terakhir.'},
    motion:{en:'Motion suffixes show direction: to a place. Build the word from the root plus the direction suffix.',id:'Akhiran gerak menunjukkan arah: menuju suatu tempat. Susun kata dari akar ditambah akhiran arah.'}
  };
  return (data[lesson]&&data[lesson][lang()])||'';
}
function topicSection(extra){return sectionBlock(L('1. Topic explanation','1. Penjelasan topik'),`${layaTopicCard()}<div class="topic-points"><div>${topicText()}</div>${extra||''}</div>`,'topic-section')}
function practiceSection(body){return sectionBlock(L('2. Practice / application','2. Latihan / praktik'),body,'practice-section')}
function renderBuilder(){const item=getList()[index];set('lessonTitle',T(lesson));answer=[];const pool=shuffle([...(item.parts||[]),...(item.wrong||[])]);window.currentPool=pool;const topic=topicSection('');const practice=practiceSection(`<div class="meaning">${text(item)}</div><div class="row"><button class="primary" id="listenFullBtn">${T('listen')}: ${esc(item.result)}</button></div><div id="answer" class="answer"></div><div class="part-grid">${pool.map((p,i)=>`<button id="p${i}" class="part-btn ${p.type==='root'?'success':p.type==='wrong'?'danger':'warning'}" data-index="${i}">${esc(p.text)}</button>`).join('')}</div><div class="row"><button class="danger" id="clearBtn">${T('clear')}</button><button class="primary" id="checkBtn">${T('check')}</button></div><div id="ruleBox" class="logic hidden"></div><div class="mini-note">${T('distractorNote')}</div><div id="fb" class="feedback">${T('tap')}</div><div id="audioMessage" class="audio-note hidden"></div>`);document.getElementById('activity').innerHTML=topic+practice;document.querySelectorAll('.part-btn').forEach(btn=>btn.addEventListener('click',()=>{const i=Number(btn.dataset.index);const p=window.currentPool[i];pick(i,p.text,p.audio||'')}));document.getElementById('listenFullBtn').addEventListener('click',()=>playWord(item));document.getElementById('clearBtn').addEventListener('click',renderBuilder);document.getElementById('checkBtn').addEventListener('click',()=>check(item.result,item.id))}
function toggleTopic(){document.getElementById('topicBox').classList.toggle('hidden')}
function pick(i,v,aud){const b=document.getElementById('p'+i);if(!b||b.disabled)return;b.disabled=true;b.classList.add('selected');answer.push(v);set('answer',answer.join(''));if(aud)playAudio(aud)}
function check(correct,id){stats.attempts++;const ok=answer.join('')===correct;if(ok)stats.score++;const fb=document.getElementById('fb');fb.textContent=ok?T('correct'):T('wrong');fb.style.background=ok?'#dcfce7':'#fee2e2';fb.style.color=ok?'#166534':'#991b1b';const current=getList()[index];const ruleBox=document.getElementById('ruleBox');if(ruleBox){ruleBox.textContent=ok?current.rule:'';ruleBox.classList.toggle('hidden',!ok)}if(ok){if(!done[lesson])done[lesson]=[];if(!done[lesson].includes(id))done[lesson].push(id);playWord(current)}saveProgress();updateStats();updateLessonBar()}
function resetProgress(){done={alphabet:[],root:[],meaning:[],plural:[],accusative:[],mutation:[],motion:[]};stats={score:0,attempts:0};saveProgress();showHome()}
renderStart();if(learner&&style)showHome();
</script>
