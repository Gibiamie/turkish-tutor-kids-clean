<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turkish Meaning Builder</title>
<style>
*{box-sizing:border-box}
:root{--blue:#2563eb;--green:#16a34a;--orange:#f59e0b;--purple:#7c3aed;--red:#dc2626;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--bg:#eef4ff}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--ink)}
.app{max-width:620px;margin:0 auto;min-height:100vh;background:#fff;padding:16px}
h1{margin:12px 0 4px;text-align:center;font-size:30px}.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:14px;line-height:1.35}
.card{background:#fff;border:2px solid var(--line);border-radius:24px;padding:16px;margin:14px 0;box-shadow:0 8px 22px rgba(0,0,0,.06)}
.prompt{text-align:center;font-size:22px;font-weight:900;margin:10px 0 14px}.small{font-size:14px;color:var(--muted);line-height:1.45}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.row{display:flex;gap:10px;margin-top:12px}.row button{flex:1}
button{border:0;border-radius:18px;padding:15px 12px;font-size:16px;font-weight:900;cursor:pointer;background:#dbeafe;color:#1e3a8a}button:active{transform:scale(.98)}button:disabled{opacity:.45}
.primary{background:#2563eb;color:#fff}.success{background:#dcfce7;color:#166534}.warning{background:#fef3c7;color:#92400e}.danger{background:#fee2e2;color:#991b1b}.ghost{background:#f3f4f6;color:#374151}.purple{background:#ede9fe;color:#5b21b6}
.tile{text-align:left;min-height:112px}.tile strong{display:block;font-size:17px;margin-bottom:8px}.tile span{font-size:14px;line-height:1.35}.hidden{display:none!important}
.big{font-size:48px;font-weight:900;text-align:center;margin:16px 0;color:var(--blue)}.huge{font-size:66px;font-weight:900;text-align:center;margin:18px 0;color:var(--blue)}.meaning{text-align:center;font-size:21px;font-weight:900;color:#374151;margin:10px 0}
.feedback{margin-top:12px;padding:12px;border-radius:16px;text-align:center;font-weight:900;background:#f3f4f6;line-height:1.4}.good{background:#dcfce7!important;color:#166534!important}.bad{background:#fee2e2!important;color:#991b1b!important}
.progress{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:10px}.bar{height:100%;background:#22c55e;width:0%;transition:width .25s}.stat{background:#f8fafc;border-radius:18px;padding:12px;text-align:center;font-weight:900}.stat small{display:block;color:#64748b;margin-top:4px}
.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:6px 10px;margin:3px;font-size:12px;font-weight:900}.part{display:inline-block;border-radius:16px;padding:10px 14px;margin:4px;font-size:20px;font-weight:900}.root{background:#dcfce7;color:#166534}.poss{background:#fee2e2;color:#991b1b}.case{background:#dbeafe;color:#1e3a8a}.person{background:#ede9fe;color:#5b21b6}.tense{background:#fef3c7;color:#92400e}.plural{background:#fce7f3;color:#9d174d}
.chain{text-align:center;margin:16px 0}.arrow{color:#64748b;font-weight:900;margin:0 2px}.table{width:100%;border-collapse:collapse;margin-top:12px}.table td{border-bottom:1px solid #e5e7eb;padding:10px;font-weight:800;vertical-align:top}.selected{min-height:58px;border:2px dashed #cbd5e1;border-radius:18px;margin:12px 0;padding:10px;text-align:center;font-weight:900;font-size:26px}
.module{border:2px solid #e5e7eb;border-radius:22px;padding:14px;margin:12px 0;background:#fff}.module.done{border-color:#22c55e;background:#f0fdf4}.module.current{border-color:#2563eb;background:#eff6ff}.coach{background:#eef2ff;color:#3730a3;border-radius:18px;padding:12px;margin:12px 0;font-weight:900;text-align:center;line-height:1.45}.badge{display:inline-block;background:#f8fafc;border:1px solid #e5e7eb;border-radius:999px;padding:6px 10px;margin:3px;font-size:12px;font-weight:900;color:#334155}.notice{background:#fff7ed;border:2px solid #fed7aa;color:#9a3412;border-radius:18px;padding:12px;margin:12px 0;font-weight:800;line-height:1.45}.evo{display:flex;flex-direction:column;gap:8px;margin:12px 0}.evo div{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:12px;font-weight:900}input,select{width:100%;padding:14px;border:2px solid #d1d5db;border-radius:16px;font-size:16px;font-weight:800;margin:6px 0 10px}.spark{animation:pop .45s}@keyframes pop{0%{transform:scale(.95)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="app">
  <h1>Turkish Meaning Builder</h1>
  <div class="sub" id="subtitle">Turkish is not memorized word by word. It is built with meaning.</div>

  <section id="startPage" class="card">
    <div class="prompt">Choose learner</div>
    <div class="grid2">
      <button class="primary tile" onclick="chooseLearner('bella')"><strong>Bella</strong><span>English explanations</span></button>
      <button class="success tile" onclick="chooseLearner('ayza')"><strong>Ayza</strong><span>Bahasa Indonesia explanations</span></button>
    </div>
    <div class="prompt" style="font-size:18px;margin-top:18px">Learning style</div>
    <select id="styleSelect">
      <option value="family">Family Mode — game + short logic</option>
      <option value="kids">Kids Mode — very simple</option>
      <option value="adult">Adult Mode — more logic</option>
    </select>
    <div class="notice">Positioning: this app teaches Turkish through <b>root + suffix + suffix = new meaning</b>, not boring word memorization.</div>
  </section>

  <section id="homePage" class="hidden">
    <div class="card">
      <div class="row"><button class="ghost" onclick="changeLearner()" id="changeBtn">Change learner</button><button class="danger" onclick="resetProgress()" id="resetBtn">Reset progress</button></div>
      <div class="prompt" id="homeTitle">Main Page</div>
      <div id="profileBadges"></div>
      <div class="coach" id="coachText"></div>
      <div class="grid3"><div class="stat"><span id="score">0</span><small id="scoreLabel">Score</small></div><div class="stat"><span id="attempts">0</span><small id="attemptsLabel">Attempts</small></div><div class="stat"><span id="accuracy">0%</span><small id="accuracyLabel">Accuracy</small></div></div>
      <div class="progress"><div class="bar" id="totalBar"></div></div>
    </div>
    <div class="card"><div class="prompt" id="mapTitle">Meaning Path</div><div id="moduleMap"></div></div>
  </section>

  <section id="lessonPage" class="hidden">
    <div class="card"><div class="row"><button class="ghost" onclick="showHome()" id="mainBtn">Main Page</button><button class="purple" onclick="renderCurrent()" id="againBtn">Again</button></div><div class="prompt" id="lessonTitle">Lesson</div><div class="progress"><div class="bar" id="lessonBar"></div></div></div>
    <div class="card" id="activity"></div>
  </section>
</div>

<script>
'use strict';
const UI={en:{subtitle:'Turkish is not memorized word by word. It is built with meaning.',change:'Change learner',reset:'Reset progress',main:'Main Page',again:'Again',coach:'You are not memorizing words. You are building meanings: root + suffix + suffix.',path:'Meaning Path',score:'Score',attempts:'Attempts',accuracy:'Accuracy',open:'Open',done:'Done',current:'Current',discover:'Discover',build:'Build',break:'Break',match:'Meaning Match',sound:'Sound',next:'Next',previous:'Previous',check:'Check',clear:'Clear',listen:'Listen',speak:'I said it',correct:'Correct!',wrong:'Try again.',choose:'Choose the correct answer',buildPrompt:'Build the Turkish meaning',breakPrompt:'Break the Turkish word',matchPrompt:'Choose the meaning',soundPrompt:'Listen and repeat',logic:'Logic Note',built:'You built a Turkish meaning!',wordEvolution:'Word Evolution'},id:{subtitle:'Bahasa Turki tidak dihafal kata demi kata. Makna dibangun dengan akar kata dan akhiran.',change:'Ganti pengguna',reset:'Hapus progres',main:'Halaman Utama',again:'Ulangi',coach:'Kamu tidak menghafal kata. Kamu membangun makna: akar kata + akhiran + akhiran.',path:'Jalur Makna',score:'Skor',attempts:'Percobaan',accuracy:'Akurasi',open:'Buka',done:'Selesai',current:'Saat ini',discover:'Temukan',build:'Susun',break:'Pecah',match:'Pilih Arti',sound:'Bunyi',next:'Berikutnya',previous:'Sebelumnya',check:'Periksa',clear:'Hapus',listen:'Dengar',speak:'Saya mengucapkan',correct:'Benar!',wrong:'Coba lagi.',choose:'Pilih jawaban yang benar',buildPrompt:'Susun makna bahasa Turki',breakPrompt:'Pecah kata Turki',matchPrompt:'Pilih artinya',soundPrompt:'Dengar dan ulangi',logic:'Catatan Logika',built:'Kamu berhasil membangun makna Turki!',wordEvolution:'Perkembangan Kata'}};
function p(form,type,en,idn){return{form,type,en,idn};}
const ALPHABET=[{module:'alphabet',id:'letter-e',letter:'e',word:'ev',en:'house',idn:'rumah',enSound:'e like “e” in bed',idSound:'e seperti “e” pada enak',warningEn:'Do not read it like English “ee”.',warningId:'Jangan dibaca seperti “i”.',contrast:'e ≠ i'},{module:'alphabet',id:'letter-i-dotless',letter:'ı',word:'ılık',en:'warm',idn:'hangat',enSound:'dotless ı: soft “uh”, not i',idSound:'ı seperti “e pepet”',warningEn:'This is not English i.',warningId:'Ini bukan bunyi “i”.',contrast:'ı ≠ i'},{module:'alphabet',id:'letter-o-umlaut',letter:'ö',word:'göz',en:'eye',idn:'mata',enSound:'say “e” while rounding lips like “o”',idSound:'antara “e” dan “o”, bibir bulat',warningEn:'Do not read it as plain o.',warningId:'Jangan dibaca seperti “o” biasa.',contrast:'ö ≠ o'},{module:'alphabet',id:'letter-u-umlaut',letter:'ü',word:'gül',en:'rose',idn:'mawar',enSound:'say “ee” while rounding lips',idSound:'seperti “i”, tapi bibir dibulatkan',warningEn:'Do not read it as plain u.',warningId:'Jangan dibaca seperti “u” biasa.',contrast:'ü ≠ u'},{module:'alphabet',id:'letter-sh',letter:'ş',word:'şapka',en:'hat',idn:'topi',enSound:'sh like “ship”',idSound:'sy seperti “syarat”',warningEn:'ş is not ç.',warningId:'ş bukan ç.',contrast:'ş ≠ ç'},{module:'alphabet',id:'letter-ch',letter:'ç',word:'çay',en:'tea',idn:'teh',enSound:'ch like “chair”',idSound:'c seperti “cari” atau “cacing”',warningEn:'ç is not ş.',warningId:'ç bukan ş.',contrast:'ç ≠ ş'},{module:'alphabet',id:'letter-soft-g',letter:'ğ',word:'dağ',en:'mountain',idn:'gunung',enSound:'soft g: usually silent; stretches the vowel',idSound:'ğ biasanya tidak dibaca; memanjangkan bunyi sebelumnya',warningEn:'No Turkish word starts with ğ.',warningId:'Tidak ada kata Turki yang dimulai dengan ğ.',contrast:'dağ → daa'}];

{id:'okul',module:'roots',result:'okul',en:'school',idn:'sekolah',parts:[p('okul','root','school','sekolah')]},{id:'araba',module:'roots',result:'araba',en:'car',idn:'mobil',parts:[p('araba','root','car','mobil')]},{id:'kitap',module:'roots',result:'kitap',en:'book',idn:'buku',parts:[p('kitap','root','book','buku')]},{id:'oda',module:'roots',result:'oda',en:'room',idn:'kamar',parts:[p('oda','root','room','kamar')]},{id:'bahçe',module:'roots',result:'bahçe',en:'garden',idn:'taman',parts:[p('bahçe','root','garden','taman')]},
{id:'evim',module:'my',result:'evim',en:'my house',idn:'rumah saya',parts:[p('ev','root','house','rumah'),p('im','poss','my','saya')],family:['ev','evim'],noteEn:'-im means “my”.',noteId:'-im berarti “saya / milik saya”.'},{id:'arabam',module:'my',result:'arabam',en:'my car',idn:'mobil saya',parts:[p('araba','root','car','mobil'),p('m','poss','my','saya')],family:['araba','arabam']},{id:'okulum',module:'my',result:'okulum',en:'my school',idn:'sekolah saya',parts:[p('okul','root','school','sekolah'),p('um','poss','my','saya')],family:['okul','okulum']},{id:'gözüm',module:'my',result:'gözüm',en:'my eye',idn:'mata saya',parts:[p('göz','root','eye','mata'),p('üm','poss','my','saya')],family:['göz','gözüm']},{id:'kitabım',module:'my',result:'kitabım',en:'my book',idn:'buku saya',parts:[p('kitap','root','book','buku'),p('ım','poss','my','saya')],family:['kitap','kitabım'],noteEn:'kitap → kitabım. Final p may soften to b.',noteId:'kitap → kitabım. Huruf p bisa berubah menjadi b.'},
{id:'evde',module:'place',result:'evde',en:'at home / in the house',idn:'di rumah',parts:[p('ev','root','house','rumah'),p('de','case','in / at','di')],family:['ev','evde']},{id:'okulda',module:'place',result:'okulda',en:'at school',idn:'di sekolah',parts:[p('okul','root','school','sekolah'),p('da','case','in / at','di')],family:['okul','okulda']},{id:'evimde',module:'place',result:'evimde',en:'in my house',idn:'di rumah saya',parts:[p('ev','root','house','rumah'),p('im','poss','my','saya'),p('de','case','in / at','di')],family:['ev','evim','evimde'],noteEn:'This is already a mini meaning: “in my house”.',noteId:'Ini sudah menjadi makna kecil: “di rumah saya”.'},{id:'okulumda',module:'place',result:'okulumda',en:'in my school',idn:'di sekolah saya',parts:[p('okul','root','school','sekolah'),p('um','poss','my','saya'),p('da','case','in / at','di')],family:['okul','okulum','okulumda']},{id:'arabamda',module:'place',result:'arabamda',en:'in my car',idn:'di mobil saya',parts:[p('araba','root','car','mobil'),p('m','poss','my','saya'),p('da','case','in / at','di')],family:['araba','arabam','arabamda']},
{id:'evime',module:'direction',result:'evime',en:'to my house',idn:'ke rumah saya',parts:[p('ev','root','house','rumah'),p('im','poss','my','saya'),p('e','case','to','ke')],family:['ev','evim','evime']},{id:'evimden',module:'direction',result:'evimden',en:'from my house',idn:'dari rumah saya',parts:[p('ev','root','house','rumah'),p('im','poss','my','saya'),p('den','case','from','dari')],family:['ev','evim','evimden']},{id:'okuluma',module:'direction',result:'okuluma',en:'to my school',idn:'ke sekolah saya',parts:[p('okul','root','school','sekolah'),p('um','poss','my','saya'),p('a','case','to','ke')],family:['okul','okulum','okuluma']},{id:'okulumdan',module:'direction',result:'okulumdan',en:'from my school',idn:'dari sekolah saya',parts:[p('okul','root','school','sekolah'),p('um','poss','my','saya'),p('dan','case','from','dari')],family:['okul','okulum','okulumdan']},{id:'arabamdan',module:'direction',result:'arabamdan',en:'from my car',idn:'dari mobil saya',parts:[p('araba','root','car','mobil'),p('m','poss','my','saya'),p('dan','case','from','dari')],family:['araba','arabam','arabamdan']},
{id:'evlerimde',module:'evolution',result:'evlerimde',en:'in my houses',idn:'di rumah-rumah saya',parts:[p('ev','root','house','rumah'),p('ler','plural','plural','jamak'),p('im','poss','my','saya'),p('de','case','in / at','di')],family:['ev','evler','evlerim','evlerimde'],noteEn:'Order: root + plural + possessive + place.',noteId:'Urutan: akar + jamak + kepunyaan + tempat.'},{id:'evimdeyim',module:'sentence',result:'evimdeyim',en:'I am in my house',idn:'Saya ada di rumah saya',parts:[p('ev','root','house','rumah'),p('im','poss','my','saya'),p('de','case','in / at','di'),p('yim','person','I am','saya ada')],family:['ev','evim','evimde','evimdeyim'],noteEn:'One Turkish word can carry a sentence-like meaning.',noteId:'Satu kata Turki bisa membawa makna seperti kalimat.'},{id:'okuldayım',module:'sentence',result:'okuldayım',en:'I am at school',idn:'Saya di sekolah',parts:[p('okul','root','school','sekolah'),p('da','case','in / at','di'),p('yım','person','I am','saya ada')],family:['okul','okulda','okuldayım']},
{id:'gidiyorum',module:'verbs',result:'gidiyorum',en:'I am going',idn:'Saya pergi',parts:[p('git','root','go','pergi'),p('iyor','tense','now / -ing','sedang'),p('um','person','I','saya')],family:['git','gidiyor','gidiyorum'],noteEn:'git changes to gidiyorum in speech flow.',noteId:'git berubah menjadi gidiyorum dalam alur bunyi.'},{id:'geliyorum',module:'verbs',result:'geliyorum',en:'I am coming',idn:'Saya datang',parts:[p('gel','root','come','datang'),p('iyor','tense','now / -ing','sedang'),p('um','person','I','saya')],family:['gel','geliyor','geliyorum']},{id:'eve gidiyorum',module:'verbs',result:'eve gidiyorum',en:'I am going home',idn:'Saya pergi ke rumah',parts:[p('ev','root','house','rumah'),p('e','case','to','ke'),p('git','root','go','pergi'),p('iyor','tense','now','sedang'),p('um','person','I','saya')],family:['ev','eve','git','gidiyorum','eve gidiyorum'],noteEn:'Word order is flexible, but suffixes carry the core meaning.',noteId:'Urutan kata fleksibel, tetapi akhiran membawa makna utama.'}
];
const MODULES=[{id:'alphabet',titleEn:'Alphabet Pro',titleId:'Alfabet Pro',descEn:'Stable sounds: ı, ö, ü, ş, ç, ğ',descId:'Bunyi stabil: ı, ö, ü, ş, ç, ğ'},{id:'roots',titleEn:'Root Words',titleId:'Akar Kata',descEn:'Roots that can grow',descId:'Akar yang bisa berkembang'},{id:'my',titleEn:'My Words',titleId:'Kata Milik Saya',descEn:'ev + im = evim',descId:'ev + im = evim'},{id:'place',titleEn:'In / At Builder',titleId:'Pembentuk Tempat',descEn:'ev + im + de = evimde',descId:'ev + im + de = evimde'},{id:'direction',titleEn:'To / From Builder',titleId:'Ke / Dari',descEn:'evime, evimden',descId:'evime, evimden'},{id:'evolution',titleEn:'Word Evolution',titleId:'Perkembangan Kata',descEn:'ev → evim → evimde',descId:'ev → evim → evimde'},{id:'sentence',titleEn:'Mini Sentence Builder',titleId:'Pembentuk Kalimat Mini',descEn:'evimdeyim',descId:'evimdeyim'},{id:'verbs',titleEn:'Verb Builder',titleId:'Pembentuk Kata Kerja',descEn:'gel + iyor + um',descId:'gel + iyor + um'}];
let profile=load('tmb_profile',null),progress=load('tmb_progress',{}),currentModule='alphabet',currentList=[],index=0,currentMode='discover',selected=[];
function $(id){return document.getElementById(id)}function L(k){const lang=profile?.lang||'en';return(UI[lang]&&UI[lang][k])||UI.en[k]||k}function tr(en,idn){return(profile?.lang==='id')?idn:en}function itemMeaning(it){return tr(it.en,it.idn)}function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function show(id){['startPage','homePage','lessonPage'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function pct(a,b){return Math.min(100,Math.max(0,Math.round((a/Math.max(1,b))*100)))}function keyDone(){return profile?profile.name+'_done':'done'}function keyStats(){return profile?profile.name+'_stats':'stats'}function doneSet(){progress[keyDone()]=progress[keyDone()]||[];return progress[keyDone()]}function stats(){progress[keyStats()]=progress[keyStats()]||{correct:0,attempts:0};return progress[keyStats()]}
function chooseLearner(name){profile={name,lang:name==='ayza'?'id':'en',style:$('styleSelect').value};save('tmb_profile',profile);showHome()}function changeLearner(){profile=null;save('tmb_profile',null);show('startPage')}function showHome(){updateStatic();renderHome();show('homePage')}function updateStatic(){$('subtitle').textContent=L('subtitle');$('changeBtn').textContent=L('change');$('resetBtn').textContent=L('reset');$('mainBtn').textContent=L('main');$('againBtn').textContent=L('again');$('homeTitle').textContent=(profile?.name==='ayza'?'Ayza':'Bella')+' — '+L('main');$('mapTitle').textContent=L('path');$('scoreLabel').textContent=L('score');$('attemptsLabel').textContent=L('attempts');$('accuracyLabel').textContent=L('accuracy')}
function renderHome(){const s=stats();$('coachText').textContent=L('coach');$('profileBadges').innerHTML=`<span class="badge">${profile.name==='ayza'?'Ayza / Indonesian':'Bella / English'}</span><span class="badge">${profile.style}</span><span class="badge">root + suffix</span>`;$('score').textContent=s.correct;$('attempts').textContent=s.attempts;$('accuracy').textContent=pct(s.correct,s.attempts)+'%';const totalItems=ALPHABET.length+ITEMS.length;$('totalBar').style.width=pct(doneSet().length,totalItems)+'%';renderModules()}
function renderModules(){const box=$('moduleMap');box.innerHTML='';MODULES.forEach((m,i)=>{const all=getModuleItems(m.id);const done=all.filter(it=>doneSet().includes(it.id)).length;const pc=pct(done,all.length||1);const div=document.createElement('div');div.className='module '+(pc===100?'done':(i===0||pc>0?'current':''));div.innerHTML=`<div style="font-size:18px;font-weight:900">${tr(m.titleEn,m.titleId)}</div><div class="small">${tr(m.descEn,m.descId)}</div><span class="pill">${pc===100?L('done'):L('current')}</span><span class="pill">${pc}%</span><div class="progress"><div class="bar" style="width:${pc}%"></div></div><button class="primary" style="width:100%;margin-top:10px">${L('open')}</button>`;div.querySelector('button').onclick=()=>openModule(m.id);box.appendChild(div)})}
function getModuleItems(moduleId){if(moduleId==='alphabet')return ALPHABET;return ITEMS.filter(x=>x.module===moduleId)}function openModule(moduleId){currentModule=moduleId;currentList=getModuleItems(moduleId);index=0;currentMode='discover';selected=[];show('lessonPage');renderCurrent()}function renderCurrent(){selected=[];const it=currentList[index];if(!it){showHome();return}$('lessonTitle').textContent=tr((MODULES.find(m=>m.id===currentModule)||{}).titleEn||'Lesson',(MODULES.find(m=>m.id===currentModule)||{}).titleId||'Pelajaran');$('lessonBar').style.width=pct(index+1,currentList.length)+'%';if(currentModule==='alphabet')return renderAlphabet(it);if(currentMode==='discover')return renderDiscover(it);if(currentMode==='build')return renderBuild(it);if(currentMode==='break')return renderBreak(it);if(currentMode==='match')return renderMatch(it);if(currentMode==='sound')return renderSound(it)}
function modeTabs(){return`<div class="grid2"><button class="${currentMode==='discover'?'primary':'ghost'}" onclick="setMode('discover')">${L('discover')}</button><button class="${currentMode==='build'?'primary':'ghost'}" onclick="setMode('build')">${L('build')}</button><button class="${currentMode==='break'?'primary':'ghost'}" onclick="setMode('break')">${L('break')}</button><button class="${currentMode==='match'?'primary':'ghost'}" onclick="setMode('match')">${L('match')}</button></div>`}function setMode(m){currentMode=m;renderCurrent()}function partSpan(part){return`<span class="part ${part.type}">${part.form}</span>`}function partsChain(it){return`<div class="chain">${it.parts.map(partSpan).join('<span class="arrow">+</span>')}<div style="margin-top:10px;font-size:28px;font-weight:900">= ${it.result}</div></div>`}function explanationTable(it){return`<table class="table">${it.parts.map(x=>`<tr><td>${partSpan(x)}</td><td>${tr(x.en,x.idn)}</td></tr>`).join('')}</table>`}function maybeLogic(it){if(profile.style==='kids')return'';const note=tr(it.noteEn||'Suffixes carry meaning. Word order can be flexible, but suffix order matters.',it.noteId||'Akhiran membawa makna. Urutan kata bisa fleksibel, tetapi urutan akhiran penting.');return`<div class="notice"><b>${L('logic')}:</b><br>${note}</div>`}
function renderDiscover(it){$('activity').innerHTML=`${modeTabs()}<div class="prompt">${L('discover')}</div>${partsChain(it)}<div class="meaning">${it.result} = ${itemMeaning(it)}</div>${explanationTable(it)}${renderEvolution(it)}${maybeLogic(it)}${renderNav()}`}
function renderEvolution(it){if(!it.family)return'';return`<div class="prompt" style="font-size:18px">${L('wordEvolution')}</div><div class="evo">${it.family.map((x,i)=>`<div>${i+1}. ${x}</div>`).join('')}</div>`}
function renderBuild(it){const buttons=shuffle(it.parts);$('activity').innerHTML=`${modeTabs()}<div class="prompt">${L('buildPrompt')}</div><div class="meaning">${itemMeaning(it)}</div><div class="grid2">${buttons.map(x=>`<button onclick="pickPart('${x.form}')">${x.form}</button>`).join('')}</div><div id="selectedBox" class="selected"></div><div class="row"><button class="danger" onclick="clearPick()">${L('clear')}</button><button class="success" onclick="checkBuild('${escapeAttr(it.result)}')">${L('check')}</button></div>${maybeLogic(it)}<div id="fb" class="feedback">${L('choose')}</div>${renderNav()}`}
function renderBreak(it){const buttons=shuffle(it.parts);$('activity').innerHTML=`${modeTabs()}<div class="prompt">${L('breakPrompt')}</div><div class="big">${it.result}</div><div class="grid2">${buttons.map(x=>`<button onclick="pickPart('${x.form}')">${x.form}</button>`).join('')}</div><div id="selectedBox" class="selected"></div><div class="row"><button class="danger" onclick="clearPick()">${L('clear')}</button><button class="success" onclick="checkBuild('${escapeAttr(it.result)}')">${L('check')}</button></div>${explanationTable(it)}<div id="fb" class="feedback">${L('choose')}</div>${renderNav()}`}
function renderMatch(it){const pool=ITEMS.filter(x=>x.id!==it.id).map(x=>itemMeaning(x));const opts=shuffle([itemMeaning(it),...shuffle(pool).slice(0,3)]);$('activity').innerHTML=`${modeTabs()}<div class="prompt">${L('matchPrompt')}</div><div class="big">${it.result}</div><div class="grid2">${opts.map(o=>`<button onclick="checkMatch('${escapeAttr(o)}','${escapeAttr(itemMeaning(it))}')">${o}</button>`).join('')}</div>${explanationTable(it)}<div id="fb" class="feedback">${L('choose')}</div>${renderNav()}`}
function renderSound(it){$('activity').innerHTML=`${modeTabs()}<div class="prompt">${L('soundPrompt')}</div><div class="big">${it.result}</div><div class="meaning">${itemMeaning(it)}</div><div class="row"><button class="primary" onclick="speak('${escapeAttr(it.result)}')">${L('listen')}</button><button class="success" onclick="markCorrect('${escapeAttr(it.id)}')">${L('speak')}</button></div>${explanationTable(it)}<div id="fb" class="feedback">${L('soundPrompt')}</div>${renderNav()}`}
function renderAlphabet(it){const sound=tr(it.enSound,it.idSound),warn=tr(it.warningEn,it.warningId),meaning=tr(it.en,it.idn);$('activity').innerHTML=`<div class="prompt">Alphabet Pro</div><div class="huge">${it.letter}</div><div class="meaning">${it.word} = ${meaning}</div><div class="feedback">${sound}<br><b>${warn}</b><br>${it.contrast}</div><div class="row"><button class="primary" onclick="speakLetter('${it.letter}')">${L('listen')} Letter</button><button class="primary" onclick="speak('${it.word}')">${L('listen')} Word</button></div><div class="grid2"><button class="success" onclick="markCorrect('${it.id}')">${L('correct')}</button><button class="danger" onclick="markWrong()">${L('wrong')}</button></div>${renderNav()}`}
function renderNav(){return`<div class="row"><button class="ghost" onclick="prevItem()">${L('previous')}</button><button class="primary" onclick="nextItem()">${L('next')}</button></div>`}function escapeAttr(s){return String(s).replace(/'/g,"\\'")}function pickPart(form){selected.push(form);const box=$('selectedBox');if(box)box.textContent=selected.join('')}function clearPick(){selected=[];const box=$('selectedBox');if(box)box.textContent=''}function setFeedback(ok,msg){const fb=$('fb');if(!fb)return;fb.textContent=msg||(ok?L('correct'):L('wrong'));fb.className='feedback '+(ok?'good':'bad')}function checkBuild(correct){const given=selected.join('');const ok=given===correct;record(ok,currentList[index].id);setFeedback(ok,ok?L('built'):L('wrong'));if(ok)speak(correct)}function checkMatch(given,correct){const ok=given===correct;record(ok,currentList[index].id);setFeedback(ok);if(ok)speak(currentList[index].result)}function markCorrect(id){record(true,id);setFeedback(true);speak(currentList[index].word||currentList[index].result)}function markWrong(){record(false,currentList[index].id);setFeedback(false)}function record(ok,id){const s=stats();s.attempts++;if(ok)s.correct++;if(ok&&!doneSet().includes(id))doneSet().push(id);save('tmb_progress',progress);renderHomeStatsOnly()}function renderHomeStatsOnly(){const s=stats();$('score').textContent=s.correct;$('attempts').textContent=s.attempts;$('accuracy').textContent=pct(s.correct,s.attempts)+'%'}function nextItem(){if(index>=currentList.length-1){showHome();return}index++;currentMode='discover';renderCurrent()}function prevItem(){index=Math.max(0,index-1);currentMode='discover';renderCurrent()}function resetProgress(){if(confirm('Reset progress?')){progress={};save('tmb_progress',progress);showHome()}}function speak(text){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='tr-TR';u.rate=.75;speechSynthesis.speak(u)}function speakLetter(l){if(l==='ş')return speakWith('sheh','en-US');if(l==='ç')return speakWith('cheh','en-US');if(l==='ğ')return speak('yumuşak ge');speak(l)}function speakWith(text,lang){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=.75;speechSynthesis.speak(u)}
if(profile)showHome();else show('startPage');
</script>
