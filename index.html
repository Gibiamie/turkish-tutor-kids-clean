function playAudio(file){const a=new Audio(file);a.onerror=()=>showAudio(`${T("missing")} (${file})`);a.play().catch(()=>showAudio(`${T("missing")} (${file})`))}function showAudio(msg){const box=document.getElementById("audioMessage");if(box){box.textContent=msg;box.classList.remove("hidden")}else alert(msg)}function speak(x){if(!("speechSynthesis" in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(x);u.lang="tr-TR";u.rate=.75;speechSynthesis.speak(u)}function mark(type,id){if(!done[type])done[type]=[];if(!done[type].includes(id)){done[type].push(id);localStorage.setItem("tmb_done",JSON.stringify(done));stats.score++;stats.attempts++;localStorage.setItem("tmb_stats",JSON.stringify(stats))}}
function renderAlphabet(){const item=ALPHABET[index];set("lessonTitle",T("alphabet"));const note=item.note_en?`<div class="logic warning">${lang()==="id"?item.note_id:item.note_en}</div>`:"";const soft=item.softG?`<div class="logic important"><b>${T("softGTitle")}</b><br>${T("softGNote")}</div>`:"";document.getElementById("activity").innerHTML=`<div class="big">${item.letter}</div><div class="meaning">${item.word} = ${text(item)}</div><div class="logic">${lang()==="id"?item.hint_id:item.hint_en}<br><b>${item.contrast}</b></div>${soft}${note}<div class="row"><button class="primary" onclick="playAudio('${item.main}')">${T("listenMain")}</button><button class="primary" onclick="playAudio('${item.example}')">${T("listenExample")}</button></div><div class="row"><button class="purple" onclick="playAudio('${item.contrastAudio}')">${T("listenContrast")}</button><button class="success" onclick="mark('alphabet','${item.id}');updateStats();">${T("know")}</button></div><div id="audioMessage" class="audio-note hidden"></div><div class="audio-note">Required files for this page:<br>${item.main}<br>${item.example}<br>${item.contrastAudio}</div>`}
function renderRoot(){const item=ROOTS[index];set("lessonTitle",T("root"));document.getElementById("activity").innerHTML=`<div class="big">${item.root}</div><div class="meaning">${text(item)}</div><div class="logic">${T("rootNote")}</div><div class="row"><button class="primary" onclick="speak('${item.root}')">${T("listen")}</button><button class="success" onclick="mark('root','${item.id}');updateStats();">${T("know")}</button></div>`}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function renderBuilder(){const item=getList()[index];set("lessonTitle",T(lesson));answer=[];const parts=shuffle(item.parts);document.getElementById("activity").innerHTML=`<div class="meaning">${text(item)}</div><div id="answer" class="answer"></div><div class="part-grid">${parts.map((p,i)=>`<button id="p${i}" class="${p[1]==='root'?'success':'warning'}" onclick="pick(${i},'${p[0]}')">${p[0]}</button>`).join("")}</div><div class="row"><button class="danger" onclick="renderBuilder()">${T("clear")}</button><button class="primary" onclick="check('${item.result}','${item.id}')">${T("check")}</button></div><div class="logic">${item.rule}</div><div id="fb" class="feedback">${T("tap")}</div>`}function pick(i,v){const b=document.getElementById("p"+i);if(b.disabled)return;b.disabled=true;answer.push(v);set("answer",answer.join(""))}function check(correct,id){stats.attempts++;const ok=answer.join("")===correct;if(ok)stats.score++;localStorage.setItem("tmb_stats",JSON.stringify(stats));const fb=document.getElementById("fb");fb.textContent=ok?T("correct"):T("wrong");fb.style.background=ok?"#dcfce7":"#fee2e2";fb.style.color=ok?"#166534":"#991b1b";if(ok){if(!done[lesson])done[lesson]=[];if(!done[lesson].includes(id))done[lesson].push(id);localStorage.setItem("tmb_done",JSON.stringify(done));speak(correct)}}function resetProgress(){done={alphabet:[],root:[],meaning:[],plural:[],accusative:[],mutation:[]};stats={score:0,attempts:0};localStorage.setItem("tmb_done",JSON.stringify(done));localStorage.setItem("tmb_stats",JSON.stringify(stats));showHome()}renderStart();if(learner&&style)showHome();
</script></body></html>
