function renderPath(){document.getElementById('pathBox').innerHTML=allLessons().map(x=>{const count=lessonProgressCount(x[0],x[4]);const pct=Math.min(100,Math.round((count/x[4])*100));return `<div class="path-card ${pct===100?'done':''}"><div class="path-title">${x[1]} ${x[2]}</div><div class="path-desc">${x[3]}</div><span class="mode-pill">${pct===100?T('done'):T('now')}</span><span class="mode-pill">${pct}%</span><div class="progress"><div class="bar" style="width:${pct}%"></div></div><button class="primary" style="width:100%;margin-top:12px" onclick="openLesson('${x[0]}')">${T('open')}</button></div>`}).join('')}

function playAudio(file){if(!file){return false}const a=new Audio(file);a.onerror=()=>showAudio(`${T('missing')} (${file})`);a.play().catch(()=>showAudio(`${T('missing')} (${file})`));return true}function showAudio(msg){const box=document.getElementById('audioMessage');if(box){box.textContent=msg;box.classList.remove('hidden')}else alert(msg)}function getTurkishVoice(){if(!('speechSynthesis' in window))return null;const voices=speechSynthesis.getVoices?speechSynthesis.getVoices():[];return voices.find(v=>String(v.lang).toLowerCase().startsWith('tr'))||voices.find(v=>String(v.name).toLowerCase().includes('turkish'))||null}function speak(x){if(!('speechSynthesis' in window)){showAudio('Speech synthesis is not supported in this browser.');return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(x);u.lang='tr-TR';u.rate=.68;u.pitch=1;const voice=getTurkishVoice();if(voice)u.voice=voice;speechSynthesis.speak(u)}function playWord(item){if(item&&item.audio){playAudio(item.audio);return}if(item&&item.result){speak(item.result);showAudio('TTS fallback used for: '+item.result)}else if(typeof item==='string'){speak(item);showAudio('TTS fallback used for: '+item)}}

function layaLine(){return L('Hi, I am Laya. I will help you build Turkish words piece by piece.','Hai, aku Laya. Aku akan membantu kamu menyusun kata Turki bagian demi bagian.')}
function layaTopicLine(){const m={alphabet:L('Listen first. Turkish letters are friendly when you hear them clearly.','Dengar dulu. Huruf Turki lebih mudah jika kamu mendengarnya dengan jelas.'),root:L('This is the root. We start small, then we grow the word.','Ini akar kata. Kita mulai kecil, lalu kata itu tumbuh.'),meaning:L('Let us build meaning: root first, then the suffixes in order.','Mari susun makna: akar dulu, lalu akhiran berurutan.'),plural:L('One becomes many with -ler or -lar. Listen to the sound.','Satu menjadi banyak dengan -ler atau -lar. Dengarkan bunyinya.'),accusative:L('This suffix shows a specific object. Build it carefully.','Akhiran ini menunjukkan objek tertentu. Susun dengan hati-hati.'),mutation:L('Some words change sound to become easier to say. Watch the last letter.','Beberapa kata berubah bunyi agar lebih mudah diucapkan. Perhatikan huruf terakhir.'),motion:L('This suffix shows direction: going to a place.','Akhiran ini menunjukkan arah: pergi ke suatu tempat.')};return m[lesson]||layaLine()}
function layaHomeCard(){return isKids()?`<div class="laya-home"><img src="${LAYA_IMG}" alt="Laya dolphin mascot"><div class="laya-text">${layaLine()}<br><span class="kids-only-badge">Kids Mode Guide</span></div></div>`:''}
function layaTopicCard(){return isKids()?`<div class="laya-topic"><img src="${LAYA_IMG}" alt="Laya dolphin mascot"><div class="laya-bubble">${layaTopicLine()}</div></div>`:''}
function sectionBlock(title,body,kind){return `<div class="section-card ${kind||''}"><div class="section-title">${title}</div>${body}</div>`}
function topicText(){
  const data={
    alphabet:{en:'Turkish spelling is mostly sound-based. A letter normally keeps the same sound. Do not only look at the letter; listen to the main sound, then hear it inside a real word, then compare it with a similar sound.',id:'Ejaan Turki biasanya berdasarkan bunyi. Satu huruf biasanya menjaga bunyi yang sama. Jangan hanya melihat huruf; dengarkan bunyi utama, lalu dengar di dalam kata asli, lalu bandingkan dengan bunyi yang mirip.'},
    root:{en:'A root word is the starting piece. In Turkish, the root normally comes first. After that, small suffix pieces are added to create new meanings. First learn the root clearly; then add suffixes.',id:'Akar kata adalah bagian awal. Dalam bahasa Turki, akar biasanya datang dulu. Setelah itu, akhiran kecil ditambahkan untuk membuat makna baru. Pelajari akar dulu, lalu tambahkan akhiran.'},
    meaning:{en:'Turkish can put several meanings inside one word. The safe formula is: ROOT + MEANING SUFFIX + PLACE / DIRECTION SUFFIX. Read from left to right. If the root changes sound, the app shows the changed form used in the final word.',id:'Bahasa Turki bisa menaruh beberapa makna dalam satu kata. Rumus aman: AKAR + AKHIRAN MAKNA + AKHIRAN TEMPAT / ARAH. Baca dari kiri ke kanan. Jika akar berubah bunyi, aplikasi menampilkan bentuk yang dipakai dalam kata akhir.'},
    plural:{en:'Plural means more than one. Turkish uses -ler or -lar. The choice depends on the last vowel sound of the root: front vowels usually take -ler, back vowels usually take -lar.',id:'Jamak berarti lebih dari satu. Bahasa Turki memakai -ler atau -lar. Pilihannya bergantung pada bunyi vokal terakhir akar: vokal depan biasanya memakai -ler, vokal belakang biasanya memakai -lar.'},
    accusative:{en:'This suffix marks a specific object: not just “apple”, but “the apple”. If the root ends with a vowel, Turkish often uses a buffer y before the object suffix: elma + yı = elmayı.',id:'Akhiran ini menandai objek tertentu: bukan hanya “apel”, tetapi “apel itu”. Jika akar berakhir dengan vokal, bahasa Turki sering memakai huruf penghubung y sebelum akhiran objek: elma + yı = elmayı.'},
    mutation:{en:'Some roots soften before a vowel suffix. This is why kitap can become kitabı, ağaç can become ağacı, and köpek can become köpeği. The sound changes to make pronunciation smoother.',id:'Beberapa akar melunak sebelum akhiran vokal. Karena itu kitap bisa menjadi kitabı, ağaç menjadi ağacı, dan köpek menjadi köpeği. Bunyi berubah agar pengucapan lebih halus.'},
    motion:{en:'Motion suffixes show movement toward a place. The meaning is “to”. Example: ev + e = eve, okul + a = okula. If the root ends with a vowel, Turkish may add y: araba + ya = arabaya.',id:'Akhiran gerak menunjukkan arah menuju tempat. Maknanya “ke”. Contoh: ev + e = eve, okul + a = okula. Jika akar berakhir dengan vokal, bahasa Turki bisa menambahkan y: araba + ya = arabaya.'}
  };
  return (data[lesson]&&data[lesson][lang()])||'';
}
function partTexts(item){return (item.parts||[]).map(p=>p.text)}
function hasPart(item,x){return partTexts(item).includes(x)}
function builderExplanation(item){
  if(!item) return '';
  if(lesson==='meaning'){
    if(item.id==='kitabımda'){
      return `<div class="formula-box"><b>Simple formula:</b><br>
      <span class="formula-line">root + my suffix + place suffix = one Turkish meaning</span><br>
      <span class="formula-note">Important sound rule: when a root like <b>kitap</b> takes a vowel-starting suffix, final <b>p</b> can soften to <b>b</b>. Think: <b>kitap → kitab-</b> before adding the rest.</span><br>
      <span class="formula-note">Then continue from left to right. Do not skip the possession suffix if the meaning says <b>my</b>.</span>
      </div>`;
    }
    if(item.id==='evde' || item.id==='evimde'){
      return `<div class="formula-box"><b>Simple formula:</b><br>
      <span class="formula-line">root + optional my suffix + place suffix</span><br>
      <span class="formula-note"><b>-de / -da</b> shows place: in / on / at. If the meaning says <b>my</b>, add the possession suffix before the place suffix. If the meaning does not say <b>my</b>, do not add it.</span>
      </div>`;
    }
    if(hasPart(item,'m')||hasPart(item,'im')||hasPart(item,'ım')||hasPart(item,'üm')||hasPart(item,'yum')){
      return `<div class="formula-box"><b>Simple formula:</b><br><span class="formula-line">root + my suffix + place suffix = one Turkish meaning</span><br><span class="formula-note">The possession suffix means <b>my</b>. The place suffix <b>-de / -da</b> means in / on / at. Build from left to right.</span></div>`;
    }
    return `<div class="formula-box"><b>Simple formula:</b><br><span class="formula-line">root + suffix = new meaning</span><br><span class="formula-note">Choose only the suffixes needed for the meaning shown above.</span></div>`;
  }
  if(lesson==='plural') return `<div class="formula-box"><b>Simple formula:</b><br><span class="formula-line">root + plural suffix = plural meaning</span><br><span class="formula-note">Use <b>-ler</b> or <b>-lar</b> according to Turkish vowel harmony. Do not show the final word until you build it.</span></div>`;
  if(lesson==='accusative') return `<div class="formula-box"><b>Simple formula:</b><br><span class="formula-line">root + object suffix = specific object</span><br><span class="formula-note">If the root ends with a vowel, Turkish often uses buffer <b>y</b> before the object suffix.</span></div>`;
  if(lesson==='mutation') return `<div class="formula-box"><b>Simple formula:</b><br><span class="formula-line">some final consonants soften before vowel suffixes</span><br><span class="formula-note">For example, final <b>p / ç / k</b> may soften when a vowel-starting suffix comes after it. The app will ask you to build the final form.</span></div>`;
  if(lesson==='motion') return `<div class="formula-box"><b>Simple formula:</b><br><span class="formula-line">root + direction suffix = to a place</span><br><span class="formula-note"><b>-e / -a</b> gives direction. If the root ends with a vowel, Turkish may add buffer <b>y</b>.</span></div>`;
  return '';
}
function topicSection(extra){return sectionBlock(L('1. Topic explanation','1. Penjelasan topik'),`${layaTopicCard()}<div class="topic-points"><div>${topicText()}</div>${extra||''}</div>`,'topic-section')}
function practiceSection(body){return sectionBlock(L('2. Practice / application','2. Latihan / praktik'),body,'practice-section')}
function renderBuilder(){const item=getList()[index];set('lessonTitle',T(lesson));answer=[];const pool=shuffle([...(item.parts||[]),...(item.wrong||[])]);window.currentPool=pool;const topic=topicSection(builderExplanation(item));const practice=practiceSection(`<div class="meaning">${text(item)}</div><div class="row"><button class="primary" id="listenFullBtn">${T('listenWord')}</button></div><div id="answer" class="answer"></div><div class="part-grid">${pool.map((p,i)=>`<button id="p${i}" class="part-btn ${p.type==='root'?'success':p.type==='wrong'?'danger':'warning'}" data-index="${i}">${esc(p.text)}</button>`).join('')}</div><div class="row"><button class="danger" id="clearBtn">${T('clear')}</button><button class="primary" id="checkBtn">${T('check')}</button></div><div id="ruleBox" class="logic hidden"></div><div class="mini-note">${T('distractorNote')}</div><div id="fb" class="feedback">${T('tap')}</div><div id="audioMessage" class="audio-note hidden"></div>`);document.getElementById('activity').innerHTML=topic+practice;document.querySelectorAll('.part-btn').forEach(btn=>btn.addEventListener('click',()=>{const i=Number(btn.dataset.index);const p=window.currentPool[i];pick(i,p.text,p.audio||'')}));document.getElementById('listenFullBtn').addEventListener('click',()=>playWord(item));document.getElementById('clearBtn').addEventListener('click',renderBuilder);document.getElementById('checkBtn').addEventListener('click',()=>check(item.result,item.id))}
function toggleTopic(){document.getElementById('topicBox').classList.toggle('hidden')}
function pick(i,v,aud){const b=document.getElementById('p'+i);if(!b||b.disabled)return;b.disabled=true;b.classList.add('selected');answer.push(v);set('answer',answer.join(''));if(aud)playAudio(aud)}
function check(correct,id){stats.attempts++;const ok=answer.join('')===correct;if(ok)stats.score++;const fb=document.getElementById('fb');fb.textContent=ok?T('correct'):T('wrong');fb.style.background=ok?'#dcfce7':'#fee2e2';fb.style.color=ok?'#166534':'#991b1b';const current=getList()[index];const ruleBox=document.getElementById('ruleBox');if(ruleBox){ruleBox.textContent=ok?current.rule:'';ruleBox.classList.toggle('hidden',!ok)}if(ok){if(!done[lesson])done[lesson]=[];if(!done[lesson].includes(id))done[lesson].push(id);recordReached();playWord(current)}saveProgress();updateStats();updateLessonBar()}
function resetProgress(){done={alphabet:[],root:[],meaning:[],plural:[],accusative:[],mutation:[],motion:[]};reached={alphabet:0,root:0,meaning:0,plural:0,accusative:0,mutation:0,motion:0};stats={score:0,attempts:0};saveProgress();showHome()}
renderStart();if(learner&&style)showHome();
</script>
