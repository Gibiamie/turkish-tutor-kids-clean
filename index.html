<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Turkish Meaning Builder — v1 RC3</title>
  <style>
    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --soft:#eef6ff;
      --primary:#2563eb;
      --primary-ink:#fff;
      --primary-soft:#dbeafe;
      --success:#16a34a;
      --danger:#dc2626;
      --warn:#d97706;
      --chip:#f8fafc;
      --radius:20px;
      --shadow:0 10px 30px rgba(15,23,42,.07);
      --touch:44px;
      --max:760px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#f8fbff 0%,#f6f8fc 100%);
      color:var(--ink);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    button:disabled{cursor:not-allowed;opacity:.55}
    .app{max-width:var(--max);margin:0 auto;min-height:100%;padding:14px 14px 88px}
    .topbar{
      position:sticky;top:0;z-index:20;
      background:rgba(246,248,252,.9);backdrop-filter:blur(12px);
      padding:10px 0 8px;margin:0 0 8px;
    }
    .brand{display:flex;align-items:center;gap:10px}
    .brand-mark{width:38px;height:38px;border-radius:13px;background:linear-gradient(135deg,#38bdf8,#2563eb);display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:var(--shadow)}
    .brand h1{font-size:18px;margin:0;line-height:1.05}
    .brand p{font-size:12px;color:var(--muted);margin:2px 0 0}
    .header-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{
      border:1px solid var(--line);background:#fff;color:var(--muted);
      min-height:34px;padding:6px 10px;border-radius:999px;font-size:13px;font-weight:700;
    }
    .pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:16px;margin:12px 0;
    }
    .hero{padding:18px}
    .hero h2{font-size:24px;letter-spacing:-.03em;margin:0 0 8px}
    .hero p{margin:0;color:var(--muted);line-height:1.45}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media (max-width:560px){.grid{grid-template-columns:1fr}.app{padding-left:12px;padding-right:12px}.hero h2{font-size:22px}}
    .topic{
      border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;text-align:left;
      display:flex;gap:12px;align-items:flex-start;min-height:118px;transition:.15s transform,.15s border-color;
    }
    .topic:hover{transform:translateY(-1px);border-color:#bfdbfe}
    .topic-num{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);font-weight:900}
    .topic h3{font-size:16px;margin:0 0 6px}
    .topic p{font-size:13px;color:var(--muted);margin:0 0 10px;line-height:1.35}
    .progress-line{height:8px;background:#edf2f7;border-radius:999px;overflow:hidden}
    .progress-line span{display:block;height:100%;background:linear-gradient(90deg,#38bdf8,#2563eb);border-radius:999px;width:0%}
    .progress-text{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px}
    .lesson-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 0}
    .lesson-title h2{font-size:21px;margin:0}
    .lesson-title p{font-size:13px;color:var(--muted);margin:4px 0 0}
    .nav-mini{display:flex;gap:6px;align-items:center;justify-content:space-between;margin:10px 0}
    .btn{
      border:0;border-radius:14px;min-height:var(--touch);padding:10px 14px;font-weight:800;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn.primary{background:var(--primary);color:var(--primary-ink)}
    .btn.secondary{background:#fff;color:#1e293b;border:1px solid var(--line)}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid transparent}
    .btn.small{min-height:36px;padding:7px 11px;border-radius:12px;font-size:13px}
    .btn.full{width:100%}
    .btn.danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .btn.success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
    .compact-actions{display:flex;gap:8px}.compact-actions .btn{flex:1}
    .explain-card{background:linear-gradient(135deg,#eef8ff,#fff);border:1px solid #dbeafe;border-radius:18px;padding:12px;display:flex;gap:12px;align-items:center}
    .laya{width:74px;height:74px;object-fit:contain;flex:0 0 74px}
    .explain-card p{margin:0;color:#334155;line-height:1.35;font-size:14px}
    .explain-card h3{margin:0 0 4px;font-size:15px}
    .learn-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}
    .learn-row span{font-size:12px;color:var(--muted)}
    .root-visual{width:110px;height:110px;margin:4px auto 12px;border-radius:24px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;box-shadow:0 8px 20px rgba(15,23,42,.06)}
    .root-visual img{width:100%;height:100%;object-fit:cover}
    .root-visual .fallback{font-size:34px;font-weight:900;color:#334155;letter-spacing:.04em}
    .center{text-align:center}
    .muted{color:var(--muted);line-height:1.45}
    .letter{font-size:76px;line-height:1;font-weight:900;letter-spacing:-.06em;margin:10px 0;color:#0f172a}
    .example-word{font-size:28px;font-weight:650;letter-spacing:0;margin:4px 0 2px;font-variant-ligatures:none}
    .word-title{font-size:30px;font-weight:850;margin:6px 0 2px}
    .meaning{font-size:15px;color:var(--muted);margin:0 0 12px}
    .audio-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0}
    .audio-status{font-size:12px;color:var(--muted);text-align:center;min-height:18px}
    .prompt{font-size:20px;font-weight:850;text-align:center;margin:4px 0 8px}
    .prompt-sub{font-size:13px;color:var(--muted);text-align:center;margin:0 0 14px}
    .answer-zone{
      min-height:58px;border:2px dashed #bfdbfe;border-radius:18px;background:#f8fbff;
      display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;padding:10px;margin:12px 0;
    }
    .answer-zone.empty{color:#94a3b8;font-weight:800;font-size:13px}
    .chip-grid{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:12px 0}
    .chip{
      min-height:42px;padding:9px 14px;border-radius:14px;background:var(--chip);border:1.5px solid #cbd5e1;
      color:#0f172a;font-weight:850;box-shadow:0 2px 8px rgba(15,23,42,.04);
    }
    .chip.selected{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .chip.suffix{border-style:dashed}
    .feedback{border-radius:16px;padding:12px;margin-top:12px;font-size:14px;line-height:1.4;display:none}
    .feedback.show{display:block}
    .feedback.ok{background:#dcfce7;color:#14532d;border:1px solid #bbf7d0}
    .feedback.bad{background:#fee2e2;color:#7f1d1d;border:1px solid #fecaca}
    .rule{font-weight:900;margin-top:6px}
    .bottom-sheet-backdrop{
      position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:60;display:none;align-items:flex-end;justify-content:center;
    }
    .bottom-sheet-backdrop.show{display:flex}
    .sheet{
      width:min(760px,100%);background:#fff;border-radius:26px 26px 0 0;padding:18px;box-shadow:0 -18px 40px rgba(15,23,42,.18);
      max-height:80vh;overflow:auto;
    }
    .sheet h3{margin:0 0 8px;font-size:20px}.sheet p{color:#334155;line-height:1.48}
    .sheet .mini-rule{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}

    .explain-detail{display:grid;gap:12px;margin:10px 0 14px;color:#0f172a}
    .sound-card{background:#f8fbff;border:1px solid #dbeafe;border-radius:18px;padding:12px}
    .sound-card h4{margin:0 0 6px;font-size:14px;color:#1e40af}
    .sound-card p{margin:0;color:#334155;line-height:1.45;font-size:15px}
    .practice-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:18px;padding:12px}
    .practice-box h4{margin:0 0 6px;font-size:14px;color:#166534}
    .practice-box ol{margin:0;padding-left:20px;color:#334155;line-height:1.5}
    .mistake-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:12px;color:#334155;line-height:1.45}
    .mini-contrast{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .mini-contrast div{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:10px;text-align:center;font-weight:850}
    .mini-contrast small{display:block;color:#64748b;font-weight:700;margin-top:4px}
    @media(max-width:560px){.mini-contrast{grid-template-columns:1fr}.sheet{border-radius:20px 20px 0 0;padding:16px}}
    .completion{display:none}.completion.show{display:block}
    .mode-note{font-size:12px;color:#64748b}
    .qa-panel{background:#0f172a;color:#e2e8f0;border-radius:18px;padding:14px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;font-size:12px;white-space:pre-wrap;overflow:auto}
    .qa-wrap{display:grid;gap:14px}
    .qa-topic{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}
    .qa-topic-head{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--line)}
    .qa-topic-title{font-weight:900;color:#0f172a}
    .qa-topic-meta{font-size:12px;color:#64748b;font-weight:800}
    .qa-table{width:100%;border-collapse:collapse;font-size:12px}
    .qa-table th,.qa-table td{border-bottom:1px solid #e2e8f0;padding:8px;vertical-align:middle;text-align:left}
    .qa-table th{background:#f1f5f9;color:#334155;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
    .qa-table tr:last-child td{border-bottom:0}
    .qa-id{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;font-weight:800;color:#334155;word-break:break-word}
    .qa-path{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;color:#475569;word-break:break-all;max-width:260px}
    .qa-thumb{width:48px;height:48px;border-radius:12px;border:1px solid #dbe4f0;background:#f8fafc;object-fit:cover;display:block}
    .qa-noimg{width:48px;height:48px;border-radius:12px;border:1px dashed #cbd5e1;background:#f8fafc;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900}
    .qa-audio-status{font-size:11px;color:#64748b;min-width:90px}
    .qa-missing{color:#991b1b;font-weight:900}
    .qa-ok{color:#166534;font-weight:900}
    @media(max-width:700px){.qa-table{font-size:11px}.qa-table th:nth-child(3),.qa-table td:nth-child(3){display:none}.qa-path{max-width:130px}.qa-thumb,.qa-noimg{width:42px;height:42px}.qa-topic-head{align-items:flex-start;flex-direction:column}}
    .footer-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(760px,100%);padding:10px 14px;background:rgba(246,248,252,.92);backdrop-filter:blur(14px);border-top:1px solid #e2e8f0;z-index:30}
    .footer-nav .compact-actions{max-width:var(--max);margin:0 auto}
    .hidden{display:none!important}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="header-row">
      <div class="brand">
        <div class="brand-mark">TR</div>
        <div>
          <h1>Turkish Meaning Builder</h1>
          <p>v1 Release Candidate 4</p>
        </div>
      </div>
      <button class="btn ghost small" id="homeBtn">Home</button>
    </div>
    <div class="pill-row">
      <button class="pill active" data-mode="kids">Kids</button>
      <button class="pill" data-mode="family">Family</button>
      <button class="pill" data-mode="adult">Adult</button>
      <button class="pill active" data-lang="en">English</button>
      <button class="pill" data-lang="id">Indonesian</button>
    </div>
  </div>

  <main id="root"></main>
</div>

<div class="footer-nav hidden" id="footerNav">
  <div class="compact-actions">
    <button class="btn secondary small" id="prevBtn">Previous</button>
    <button class="btn secondary small" id="mainBtn">Main Page</button>
    <button class="btn primary small" id="nextBtn">Next</button>
  </div>
</div>

<div class="bottom-sheet-backdrop" id="sheetBackdrop">
  <div class="sheet">
    <h3 id="sheetTitle"></h3>
    <div id="sheetBody"></div>
    <button class="btn primary full" id="sheetClose">Got it</button>
  </div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const CONFIG = {
  version: "v1-rc4",
  layaPath: "assets/laya_dolphin_3d_transparent.png",
  qaMode: new URLSearchParams(location.search).get("qa") === "1",
  storageKey: "tmb_v1_rc_progress"

const STATE = {
  mode: "kids",
  lang: "en",
  view: "home",
  topic: null,
  index: 0,
  selected: [],
  answered: false

const TXT = {
  en: {

  id: {

    homeSub: "Latih lima topik pertama dengan audio aman, progres jelas, dan tanpa membocorkan jawaban.",
    listen: "Dengarkan bunyi Turki",
    listenAfter: "Suara terbuka setelah jawaban benar.",

    learnWhy: "Pelajari alasannya",

    answerHere: "Susun jawaban di sini",
    completed: "Selesai",
    start: "Mulai",
    continue: "Lanjutkan",
    reset: "Hapus progres"
  }
};

/* =========================
   DATA MAP
========================= */
const TOPICS = [
  {id:"alphabet", title:"Alphabet Pro", sub:"Sounds and contrasts", type:"alphabet"},
  {id:"root_words", title:"Root Words", sub:"Concrete starter words", type:"root"},
  {id:"meaning_builder", title:"Meaning Builder", sub:"Root + meaning suffixes", type:"builder"},
  {id:"plural_builder", title:"Plural Builder", sub:"-lar / -ler", type:"builder"},
  {id:"accusative_builder", title:"Accusative Builder", sub:"The definite object", type:"builder"}
];

const ALPHABET_PRO = [
  {id:"alpha_a",letter:"a",target:"Turkish a sound",mainAudio:"audio/pronunciation_tr_a.mp3",exampleWord:"araba",exampleAudio:"audio/pronunciation_tr_araba.mp3",sourceRule:"phoneme_consistency"},
  {id:"alpha_e",letter:"e",target:"Turkish e sound; not i",mainAudio:"audio/pronunciation_tr_e.mp3",exampleWord:"ev",exampleAudio:"audio/pronunciation_tr_ev.mp3",contrast:"i",contrastAudio:"audio/pronunciation_tr_i.mp3",explanationKey:"e_i_contrast"},
  {id:"alpha_i_dotless",letter:"ı",target:"Dotless Turkish ı",mainAudio:"audio/pronunciation_tr_i_noktasiz.mp3",exampleWord:"altı",exampleAudio:"audio/pronunciation_tr_alti.mp3",contrast:"i",contrastAudio:"audio/pronunciation_tr_i.mp3",explanationKey:"i_ı_contrast"},
  {id:"alpha_i",letter:"i",target:"Dotted Turkish i",mainAudio:"audio/pronunciation_tr_i.mp3",exampleWord:"iki",exampleAudio:"audio/pronunciation_tr_iki.mp3",contrast:"ı",contrastAudio:"audio/pronunciation_tr_i_noktasiz.mp3",explanationKey:"i_ı_contrast"},
  {id:"alpha_o",letter:"o",target:"Turkish o sound",mainAudio:"audio/pronunciation_tr_o.mp3",exampleWord:"on",exampleAudio:"audio/pronunciation_tr_on.mp3",contrast:"ö",contrastAudio:"audio/pronunciation_tr_o_noktali.mp3",explanationKey:"o_ö_contrast"},
  {id:"alpha_o_noktali",letter:"ö",target:"Turkish ö sound",mainAudio:"audio/pronunciation_tr_o_noktali.mp3",exampleWord:"öğretmen",exampleAudio:"audio/pronunciation_tr_ogretmen.mp3",contrast:"o",contrastAudio:"audio/pronunciation_tr_o.mp3",explanationKey:"o_ö_contrast"},
  {id:"alpha_u",letter:"u",target:"Turkish u sound",mainAudio:"audio/pronunciation_tr_u.mp3",exampleWord:"su",exampleAudio:"audio/pronunciation_tr_su.mp3",contrast:"ü",contrastAudio:"audio/pronunciation_tr_u_noktali.mp3",explanationKey:"u_ü_contrast"},
  {id:"alpha_u_noktali",letter:"ü",target:"Turkish ü sound",mainAudio:"audio/pronunciation_tr_u_noktali.mp3",exampleWord:"üzgünüm",exampleAudio:"audio/pronunciation_tr_uzgunum.mp3",contrast:"u",contrastAudio:"audio/pronunciation_tr_u.mp3",explanationKey:"u_ü_contrast"},
  {id:"alpha_c",letter:"c",target:"Turkish c; not English c / Indonesian c",mainAudio:"audio/pronunciation_tr_c.mp3",exampleWord:"c",exampleAudio:"audio/pronunciation_tr_c.mp3",contrast:"ç",contrastAudio:"audio/pronunciation_tr_cok.mp3",explanationKey:"c_ç_contrast"},
  {id:"alpha_c_cedilla",letter:"ç",target:"Turkish ç sound",mainAudio:"audio/pronunciation_tr_cok.mp3",exampleWord:"ağaç",exampleAudio:"audio/pronunciation_tr_agac.mp3",contrast:"ş",contrastAudio:"audio/pronunciation_tr_sh.mp3",explanationKey:"ş_ç_contrast"},
  {id:"alpha_sh",letter:"ş",target:"Turkish ş sound",mainAudio:"audio/pronunciation_tr_sh.mp3",exampleWord:"şeker",exampleAudio:"audio/pronunciation_tr_seker.mp3",contrast:"ç",contrastAudio:"audio/pronunciation_tr_cok.mp3",explanationKey:"ş_ç_contrast"},
  {id:"alpha_soft_g",letter:"ğ",target:"Safe learner explanation of ğ",mainAudio:null,exampleWord:"dağ",exampleAudio:"audio/pronunciation_tr_dag.mp3",extraExamples:[{word:"ağaç",audio:"audio/pronunciation_tr_agac.mp3"},{word:"soğuk",audio:"audio/pronunciation_tr_soguk.mp3"}],contrast:"g",contrastAudio:"audio/pronunciation_tr_gel.mp3",explanationKey:"safe_ğ_explanation"}
];

const ROOT_WORDS = [
  {id:"root_ev",word:"ev",meaning_en:"house",meaning_id:"rumah",audio:"audio/pronunciation_tr_ev.mp3",image:"images/ev.png",fallback:"🏠"},
  {id:"root_okul",word:"okul",meaning_en:"school",meaning_id:"sekolah",audio:"audio/pronunciation_tr_okul.mp3",image:"images/okul.png",fallback:"🏫"},
  {id:"root_kitap",word:"kitap",meaning_en:"book",meaning_id:"buku",audio:"audio/pronunciation_tr_kitap.mp3",image:"images/kitap.png",fallback:"📘"},

  {id:"root_kopek",word:"köpek",meaning_en:"dog",meaning_id:"anjing",audio:"audio/pronunciation_tr_kopek.mp3",image:"images/kopek.png",fallback:"🐶"},
  {id:"root_goz",word:"göz",meaning_en:"eye",meaning_id:"mata",audio:"audio/pronunciation_tr_goz.mp3",image:"images/goz.png",fallback:"👁️"},
  {id:"root_masa",word:"masa",meaning_en:"table",meaning_id:"meja",audio:"audio/pronunciation_tr_masa.mp3",image:"images/masa.png",fallback:"TABLE"},
  {id:"root_araba",word:"araba",meaning_en:"car",meaning_id:"mobil",audio:"audio/pronunciation_tr_araba.mp3",image:"images/araba.png",fallback:"🚗"},
  {id:"root_su",word:"su",meaning_en:"water",meaning_id:"air",audio:"audio/pronunciation_tr_su.mp3",image:"images/su.png",fallback:"💧"},
  {id:"root_kalem",word:"kalem",meaning_en:"pencil",meaning_id:"pensil",audio:"audio/pronunciation_tr_kalem.mp3",image:"images/kalem.png",fallback:"✏️"}
];

const MEANING_BUILDER = [
  {id:"meaning_evim",prompt_en:"my house",prompt_id:"rumah saya",answerParts:["ev","im"],options:["ev","im","de","in"],finalWord:"evim",audio:"audio/pronunciation_tr_evim.mp3",image:"images/ev.png",revealAfterCorrect:"ev + im = evim",explanationKey:"possessive_suffix_basic"},

function datasetFor(topicId){
  if(topicId==="alphabet") return ALPHABET_PRO;
  if(topicId==="root_words") return ROOT_WORDS;
  if(topicId==="meaning_builder") return MEANING_BUILDER;
  if(topicId==="plural_builder") return PLURAL_BUILDER;
  if(topicId==="accusative_builder") return ACCUSATIVE_BUILDER;
  return [];
}

/* =========================
   PROGRESS ENGINE
========================= */
function loadProgress(){
  try{
    return JSON.parse(localStorage.getItem(CONFIG.storageKey)) || {completed:{alphabet:[],root_words:[],meaning_builder:[],plural_builder:[],accusative_builder:[]},attempts:{}};
  }catch(e){return {completed:{alphabet:[],root_words:[],meaning_builder:[],plural_builder:[],accusative_builder:[]},attempts:{}}}
}
let PROGRESS = loadProgress();
function saveProgress(){localStorage.setItem(CONFIG.storageKey, JSON.stringify(PROGRESS))}
function topicKey(id){return id}
function markComplete(topic,id){
  const k=topicKey(topic);
  if(!PROGRESS.completed[k]) PROGRESS.completed[k]=[];
  if(!PROGRESS.completed[k].includes(id)) PROGRESS.completed[k].push(id);
  saveProgress();
}
function isComplete(topic,id){return validCompletedIds(topic).includes(id)}
function validCompletedIds(topic){
  const validIds = new Set(datasetFor(topic).map(x=>x.id));
  return (PROGRESS.completed[topicKey(topic)]||[]).filter(id=>validIds.has(id));
}
function completionPct(topic){
  const total=datasetFor(topic).length || 1;
  const done=validCompletedIds(topic).length;
  return Math.min(100, Math.round((done/total)*100));
}
function countAttempt(itemId, ok){
  if(!PROGRESS.attempts[itemId]) PROGRESS.attempts[itemId]={total:0,correct:0,wrong:0};
  PROGRESS.attempts[itemId].total++;
  if(ok) PROGRESS.attempts[itemId].correct++; else PROGRESS.attempts[itemId].wrong++;
  saveProgress();
}

/* =========================
   AUDIO ENGINE
========================= */
let currentAudio=null;
function playAudio(path, statusElId){
  const status = statusElId ? document.getElementById(statusElId) : null;
  if(!path){
    if(status) status.textContent = "Audio not available yet.";
    return;
  }
  try{
    if(currentAudio){currentAudio.pause(); currentAudio=null;}
    const a = new Audio(path);
    currentAudio = a;
    if(status) status.textContent = "Loading sound…";
    a.addEventListener("playing",()=>{if(status) status.textContent="Playing…"});
    a.addEventListener("ended",()=>{if(status) status.textContent="Ready to replay."; currentAudio=null;});
    a.addEventListener("error",()=>{if(status) status.textContent="Audio file could not be loaded."; currentAudio=null;});
    a.play().catch(()=>{if(status) status.textContent="Tap again to play sound.";});
  }catch(e){
    if(status) status.textContent="Audio not available.";
  }
}

/* =========================
   VISUAL ENGINE
========================= */
function safeFallback(item){
  if(!item) return "WORD";
  return item.fallback || item.word || "WORD";
}
function renderVisual(item, cls="root-visual"){
  const fallback = safeFallback(item);
  if(item && item.image){
    return `<div class="${cls}"><img src="${item.image}" alt="" onerror="this.remove();this.parentElement.innerHTML='<span class=&quot;fallback&quot;>${String(fallback).replace(/'/g,"")}</span>'"></div>`;
  }
  return `<div class="${cls}"><span class="fallback">${fallback}</span></div>`;
}

   UI COMPONENTS
========================= */
const root = document.getElementById("root");
function t(key){return TXT[STATE.lang][key] || TXT.en[key] || key}
function topicTitle(id){return TOPICS.find(x=>x.id===id)?.title || id}
function buttonLabelForProgress(p){return p>=100?t("completed"):p>0?t("continue"):t("start")}
function progressBar(topic){
  const p=completionPct(topic);
  return `<div class="progress-line"><span style="width:${p}%"></span></div><div class="progress-text">${p}% ${p>=100?t("completed"):""}</div>`;
}
function explanationButton(key){
  if(!key) return "";
  const label = STATE.mode==="kids" ? t("layaExplains") : (STATE.mode==="adult" ? t("grammarRule") : t("learnWhy"));
  return `<button class="btn secondary small" onclick="openExplanation('${key}')">${label}</button>`;
}
function renderExplain(key, fallback){
  const ex = EXPLANATION_MAP[key] || {main:fallback||"Listen, compare, and practice."};
  const showLaya = STATE.mode==="kids";
  return `<div class="explain-card">
    ${showLaya?`<img class="laya" src="${CONFIG.layaPath}" alt="Laya" onerror="this.style.display='none'">`:""}
    <div style="flex:1">
      <h3>${STATE.mode==="kids"?"Laya guide":"Topic explanation"}</h3>
      <p>${ex.main || fallback || ""}</p>
      <div class="learn-row"><span>${STATE.mode==="kids"?"Tap Laya for hearing tips and practice steps.":"Tap for the rule, examples, and common mistake."}</span>${explanationButton(key)}</div>
    </div>
  </div>`;
}
function openExplanation(key){
  const ex = EXPLANATION_MAP[key];
  if(!ex) return;
  document.getElementById("sheetTitle").textContent = STATE.mode==="kids" ? "Laya explains" : "Learn why";
  const txt = STATE.lang==="id" ? ex.id : (STATE.mode==="adult" ? ex.adult_en : ex.kids_en);
  const detail = txt || ex.main || "";
  document.getElementById("sheetBody").innerHTML = `<div>${detail}</div><div class="mini-rule"><b>Key rule:</b> ${ex.main}</div>`;
  document.getElementById("sheetBackdrop").classList.add("show");
}
document.getElementById("sheetClose").onclick=()=>document.getElementById("sheetBackdrop").classList.remove("show");
document.getElementById("sheetBackdrop").addEventListener("click",e=>{if(e.target.id==="sheetBackdrop") e.currentTarget.classList.remove("show")});

/* =========================
   RENDERERS
========================= */
function renderHome(){
  STATE.view="home"; STATE.topic=null;
  document.getElementById("footerNav").classList.add("hidden");
  const topics = TOPICS.map((topic,i)=>{
    const p=completionPct(topic.id);
    return `<button class="topic" onclick="openTopic('${topic.id}',0)">
      <div class="topic-num">${i+1}</div>
      <div style="flex:1">
        <h3>${topic.title}</h3>
        <p>${topic.sub}</p>
        ${progressBar(topic.id)}
        <div class="progress-text">${buttonLabelForProgress(p)}</div>
      </div>
    </button>`;
  }).join("");
  root.innerHTML = `
    <section class="card hero">
      <h2>${t("homeTitle")}</h2>
      <p>${t("homeSub")}</p>
      <div style="margin-top:12px"><button class="btn danger small" onclick="resetProgress()">${t("reset")}</button></div>
    </section>
    <section class="grid">${topics}</section>
    ${CONFIG.qaMode?renderQA():''}
  `;
}

function openTopic(topic,index=0){
  STATE.view="lesson"; STATE.topic=topic; STATE.index=Math.max(0,Math.min(index,datasetFor(topic).length-1)); STATE.selected=[]; STATE.answered=false;
  renderLesson();
}
function currentItem(){return datasetFor(STATE.topic)[STATE.index]}
function updateFooterButtons(){
  const total = datasetFor(STATE.topic).length;
  document.getElementById("prevBtn").disabled = STATE.index <= 0;
  document.getElementById("nextBtn").disabled = STATE.index >= total - 1;
}
function refreshLessonProgress(){
  const el = document.getElementById("lessonProgress");
  if(el) el.innerHTML = progressBar(STATE.topic);
}
function renderLesson(){
  const topic=TOPICS.find(x=>x.id===STATE.topic);
  const item=currentItem();
  document.getElementById("footerNav").classList.remove("hidden");
  updateFooterButtons();
  let body="";
  if(topic.type==="alphabet") body=renderAlphabet(item);
  if(topic.type==="root") body=renderRootWord(item);
  if(topic.type==="builder") body=renderBuilder(topic.id,item);
  root.innerHTML = `<div class="lesson-head">
    <div class="lesson-title"><h2>${topic.title}</h2><p>Item ${STATE.index+1} / ${datasetFor(STATE.topic).length}</p></div>
    <div id="lessonProgress" style="min-width:120px">${progressBar(STATE.topic)}</div>
  </div>${body}`;
}
function renderAlphabet(item){
  const statusId = `audio-status-${item.id}`;
  const extras = item.extraExamples ? item.extraExamples.map(x=>`<button class="btn secondary small" onclick="playAudio('${x.audio}','${statusId}')">Example: ${x.word}</button>`).join("") : "";
  return `<section class="card center">
    ${renderExplain(item.explanationKey, item.target)}
    <div class="letter">${item.letter}</div>
    <div class="prompt-sub">${item.target}</div>
    <div class="audio-row">
      ${item.mainAudio?`<button class="btn secondary small" onclick="playAudio('${item.mainAudio}','${statusId}')">Main sound</button>`:""}
      <button class="btn secondary small" onclick="playAudio('${item.exampleAudio}','${statusId}')">Example word</button>
      ${item.contrastAudio?`<button class="btn secondary small" onclick="playAudio('${item.contrastAudio}','${statusId}')">Contrast sound</button>`:""}
      ${extras}
    </div>
    <div class="example-word">${item.exampleWord || ""}</div>
    <div class="audio-status" id="${statusId}"></div>
    <div style="margin-top:16px"><button class="btn success full" onclick="markAndRender('${STATE.topic}','${item.id}')">${t("know")}</button></div>
  </section>`;
}
function renderRootWord(item){
  const statusId = `audio-status-${item.id}`;
  return `<section class="card center">
    ${renderVisual(item)}
    <div class="word-title">${item.word}</div>
    <p class="meaning">${STATE.lang==="id"?item.meaning_id:item.meaning_en}</p>
    <button class="btn secondary" onclick="playAudio('${item.audio}','${statusId}')">${t("listen")}</button>
    <div class="audio-status" id="${statusId}"></div>
    <div style="margin-top:16px"><button class="btn success full" onclick="markAndRender('${STATE.topic}','${item.id}')">${t("know")}</button></div>
  </section>`;
}
function renderBuilder(topicId,item){
  const statusId = `audio-status-${item.id}`;
  const selectedHtml = STATE.selected.length ? STATE.selected.map(x=>`<button class="chip selected" onclick="removeSelected('${x}')">${x}</button>`).join("") : t("answerHere");
  const options = item.options.map(part=>`<button class="chip ${isSuffix(part)?'suffix':''}" onclick="pickPart('${part.replace(/'/g,"\\'")}')">${part}</button>`).join("");
  const imageItem = item.image ? {image:item.image,fallback:""} : null;
  return `<section class="card">
    ${renderExplain(item.explanationKey, "Build from left to right: root first, suffixes after.")}
    <div class="prompt">${STATE.lang==="id"?item.prompt_id:item.prompt_en}</div>
    <p class="prompt-sub">${t("listenAfter")}</p>
    ${imageItem?renderVisual(imageItem):""}
    <div class="answer-zone ${STATE.selected.length?'':'empty'}">${selectedHtml}</div>
    <div class="chip-grid">${options}</div>
    <div class="compact-actions">
      <button class="btn secondary" onclick="clearSelection()">${t("clear")}</button>
      <button class="btn primary" onclick="checkAnswer()">${t("check")}</button>
    </div>
    <div id="feedback" class="feedback"></div>
    <div class="audio-status" id="${statusId}"></div>
  </section>`;
}
function isSuffix(p){return !["ev","araba","masa","kalem","el","göz","kitap","park","köpek","okul","gazete","elma"].includes(p)}
function pickPart(part){
  if(STATE.answered) return;
  STATE.selected.push(part);
  renderLesson();
}
function removeSelected(part){
  if(STATE.answered) return;
  const idx=STATE.selected.indexOf(part);
  if(idx>-1) STATE.selected.splice(idx,1);
  renderLesson();
}
function clearSelection(){STATE.selected=[]; STATE.answered=false; renderLesson();}
function checkAnswer(){
  const item=currentItem();
  const ok = JSON.stringify(STATE.selected)===JSON.stringify(item.answerParts);
  countAttempt(item.id,ok);
  const fb=document.getElementById("feedback");
  fb.className=`feedback show ${ok?'ok':'bad'}`;
  if(ok){
    STATE.answered=true;
    markComplete(STATE.topic,item.id);
    refreshLessonProgress();
    const nextAction = STATE.index < datasetFor(STATE.topic).length - 1
      ? `<button class="btn primary small" onclick="go(1)">${t("next")}</button>`
      : `<button class="btn primary small" onclick="renderHome()">${t("mainPage")}</button>`;
    fb.innerHTML = `${t("correct")}<div class="rule">${item.revealAfterCorrect}</div><div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn secondary small" onclick="playAudio('${item.audio}','audio-status-${item.id}')">${t("listen")}</button>${nextAction}</div>`;
  }else{
    fb.innerHTML = t("wrong");
  }
  saveProgress();
}
function markAndRender(topic,id){markComplete(topic,id); renderLesson();}
function resetProgress(){if(confirm("Delete all local progress?")){localStorage.removeItem(CONFIG.storageKey); PROGRESS=loadProgress(); renderHome();}}
function go(delta){const total=datasetFor(STATE.topic).length; const target=STATE.index+delta; if(target<0 || target>=total) return; openTopic(STATE.topic, target)}
function qaAudioFor(x){return x.audio||x.mainAudio||x.exampleAudio||"";}
function qaImageFor(x){return x.image||"";}
function qaSafeId(id){return String(id||"").replace(/[^a-zA-Z0-9_-]/g,"_");}
function renderQARow(topicId,x){
  const audio=qaAudioFor(x);
  const image=qaImageFor(x);
  const sid=qaSafeId(`${topicId}_${x.id}`);
  const audioCell = audio
    ? `<button class="btn secondary small" onclick="playAudio('${audio}','qa-audio-${sid}')">Play</button>`
    : `<span class="qa-missing">No audio</span>`;
  const imageCell = image
    ? `<img class="qa-thumb" src="${image}" alt="${x.id}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'qa-noimg',textContent:'Missing'}))">`
    : `<div class="qa-noimg">n/a</div>`;
  return `
    <tr>
      <td class="qa-id">${x.id}</td>
      <td>${audioCell}<div id="qa-audio-${sid}" class="qa-audio-status">${audio?"Ready":"Missing"}</div></td>
      <td class="qa-path">${audio||"n/a"}</td>
      <td>${imageCell}</td>
      <td class="qa-path">${image||"n/a"}</td>
    </tr>`;
}
function renderQA(){
  const sections = TOPICS.map(topic=>{
    const ds=datasetFor(topic.id);
    const missingAudio=ds.filter(x=>!qaAudioFor(x)).length;
    const missingImage=ds.filter(x=>!qaImageFor(x)).length;
    return `
      <div class="qa-topic">
        <div class="qa-topic-head">
          <div class="qa-topic-title">${topic.title}</div>
          <div class="qa-topic-meta">${ds.length} items · ${completionPct(topic.id)}% complete · audio missing: ${missingAudio} · image n/a: ${missingImage}</div>
        </div>
        <table class="qa-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Audio Test</th>
              <th>Audio Path</th>
              <th>Image</th>
              <th>Image Path</th>
            </tr>
          </thead>
          <tbody>${ds.map(x=>renderQARow(topic.id,x)).join("")}</tbody>
        </table>
      </div>`;
  }).join("");
  return `<section class="card"><h2>QA Mode</h2><p class="muted">Use this page before launch to test audio and check image mapping. This is not visible unless the URL contains <b>?qa=1</b>.</p><div class="qa-wrap">${sections}</div></section>`;
}

/* =========================
   APP INIT
========================= */
document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{
  STATE.mode=b.dataset.mode;
  document.querySelectorAll("[data-mode]").forEach(x=>x.classList.toggle("active",x.dataset.mode===STATE.mode));
  STATE.view==="home"?renderHome():renderLesson();
});
document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>{
  STATE.lang=b.dataset.lang;
  document.querySelectorAll("[data-lang]").forEach(x=>x.classList.toggle("active",x.dataset.lang===STATE.lang));
  STATE.view==="home"?renderHome():renderLesson();
});
document.getElementById("homeBtn").onclick=renderHome;
document.getElementById("mainBtn").onclick=renderHome;
document.getElementById("prevBtn").onclick=()=>go(-1);
document.getElementById("nextBtn").onclick=()=>go(1);
renderHome();
</script>
</body>
</html>
