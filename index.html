<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Turkish Meaning Builder</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef4ff;
  color:#0f172a;
}

.app{
  max-width:640px;
  margin:0 auto;
  min-height:100vh;
  background:#fff;
  padding:16px;
}

h1{
  text-align:center;
  margin:22px 0 6px;
  font-size:30px;
}

.subtitle{
  text-align:center;
  color:#475569;
  font-size:14px;
  margin-bottom:18px;
}

.card{
  background:#fff;
  border:2px solid #e2e8f0;
  border-radius:24px;
  padding:18px;
  margin:16px 0;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

.prompt{
  text-align:center;
  font-size:24px;
  font-weight:900;
  margin:8px 0 16px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.row button{
  flex:1;
}

button{
  border:0;
  border-radius:18px;
  padding:15px 12px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  background:#dbeafe;
  color:#1e3a8a;
}

button:active{
  transform:scale(.98);
}

.primary{
  background:#2563eb;
  color:#fff;
}

.success{
  background:#dcfce7;
  color:#166534;
}

.warning{
  background:#fef3c7;
  color:#92400e;
}

.danger{
  background:#fee2e2;
  color:#991b1b;
}

.ghost{
  background:#f1f5f9;
  color:#334155;
}

.purple{
  background:#ede9fe;
  color:#5b21b6;
}

.hidden{
  display:none!important;
}

select{
  width:100%;
  font-size:17px;
  font-weight:800;
  padding:14px;
  border-radius:16px;
  border:2px solid #cbd5e1;
  background:white;
}

.big{
  font-size:52px;
  font-weight:900;
  text-align:center;
  margin:14px 0;
  color:#2563eb;
}

.meaning{
  text-align:center;
  font-size:20px;
  font-weight:900;
  color:#334155;
  margin:10px 0;
}

.small{
  font-size:14px;
  color:#64748b;
  line-height:1.5;
}

.feedback{
  margin-top:12px;
  padding:12px;
  border-radius:16px;
  background:#f1f5f9;
  text-align:center;
  font-weight:900;
}

.logic{
  margin-top:12px;
  padding:12px;
  border-radius:18px;
  background:#eef2ff;
  color:#3730a3;
  font-weight:800;
  line-height:1.5;
  text-align:center;
}

.logic.adult{
  background:#ecfeff;
  color:#155e75;
  text-align:left;
}

.logic.kids{
  background:#fff7ed;
  color:#9a3412;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

.table td{
  border-bottom:1px solid #e5e7eb;
  padding:9px;
  font-weight:800;
}

.progress{
  height:12px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  background:#22c55e;
  width:0;
}

.stat{
  background:#f8fafc;
  border-radius:16px;
  padding:12px;
  text-align:center;
  font-weight:900;
}

.stat small{
  display:block;
  color:#64748b;
  margin-top:4px;
}

.mode-pill{
  display:inline-block;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:999px;
  padding:6px 10px;
  margin:4px;
  font-size:12px;
  font-weight:900;
  color:#334155;
}

.path-card{
  border:2px solid #e2e8f0;
  border-radius:22px;
  padding:14px;
  margin:12px 0;
  background:#fff;
}

.path-card.current{
  border-color:#2563eb;
  background:#eff6ff;
}

.path-card.done{
  border-color:#22c55e;
  background:#f0fdf4;
}

.path-title{
  font-size:20px;
  font-weight:900;
  margin-bottom:6px;
}

.path-desc{
  color:#475569;
  margin-bottom:8px;
}
</style>
</head>

<body>
<div class="app">

<h1 id="appTitle">Turkish Meaning Builder</h1>
<div class="subtitle" id="subtitle"></div>

<section id="startPage" class="card">
  <div class="prompt" id="chooseLearner"></div>

  <div class="grid2">
    <button class="primary" onclick="chooseLearner('bella')">
      Bella<br>
      <span class="small" id="bellaLabel"></span>
    </button>

    <button class="success" onclick="chooseLearner('ayza')">
      Ayza<br>
      <span class="small" id="ayzaLabel"></span>
    </button>
  </div>

  <div class="prompt" id="learningStyleTitle" style="margin-top:22px"></div>

  <select id="styleSelect" onchange="setStyle(this.value)">
    <option value="family" id="optFamily"></option>
    <option value="kids" id="optKids"></option>
    <option value="adult" id="optAdult"></option>
  </select>

  <div id="stylePreview" class="logic"></div>
</section>

<section id="homePage" class="hidden">
  <div class="card">
    <div class="row">
      <button class="ghost" onclick="backToStart()" id="changeLearner"></button>
      <button class="danger" onclick="deleteProgress()" id="deleteProgress"></button>
    </div>

    <div class="prompt" id="mainTitle"></div>

    <div id="modeInfo"></div>

    <div id="positioning" class="logic"></div>

    <div class="grid3">
      <div class="stat">
        <span id="score">0</span>
        <small id="scoreLabel"></small>
      </div>

      <div class="stat">
        <span id="attempts">0</span>
        <small id="attemptsLabel"></small>
      </div>

      <div class="stat">
        <span id="accuracy">0%</span>
        <small id="accuracyLabel"></small>
      </div>
    </div>

    <div class="progress">
      <div id="bar" class="bar"></div>
    </div>
  </div>

  <div class="card">
    <div class="prompt" id="pathTitle"></div>
    <div id="pathBox"></div>
  </div>
</section>

<section id="lessonPage" class="hidden">
  <div class="card">
    <div class="row">
      <button class="ghost" onclick="showHome()" id="mainMenuBtn"></button>
      <button class="primary" onclick="nextItem()" id="nextBtn"></button>
    </div>

    <div class="prompt" id="lessonTitle"></div>

    <div id="activity"></div>
  </div>
</section>

</div>

<script>
const UI = {
  en: {
    subtitle: "Turkish isn't memorized word by word. Meaning is built from roots and endings.",
    chooseLearner: "Choose learner",
    bellaLabel: "English explanations",
    ayzaLabel: "Indonesian explanations",
    learningStyleTitle: "Learning style",

    familyOpt: "Family Mode — game + short logic",
    kidsOpt: "Kids Mode — very simple",
    adultOpt: "Adult Mode — more logic",

    familyPreview: "👨‍👧 Family Mode: game first, short logic after the answer. Best for child + parent together.",
    kidsPreview: "🧒 Kids Mode: fewer grammar notes, bigger actions, game-style feedback.",
    adultPreview: "🧠 Adult Mode: shows why the suffix is used, word order logic, and short grammar explanations.",

    changeLearner: "Change user",
    deleteProgress: "Delete progress",
    homePage: "Home Page",

    positioning: "You don't memorize words. You construct meaning: root word + suffix + ending.",

    score: "Score",
    attempts: "Test",
    accuracy: "Accuracy",

    pathTitle: "Path of Meaning",
    atMoment: "At the moment",
    open: "Open",
    mainMenu: "Main Page",
    next: "Next",

    alphabet: "Alphabet Pro",
    alphabetDesc: "Stable sounds: ı, ö, ü, ş, ç, ğ",

    root: "Root Word",
    rootDesc: "Roots that can grow",

    meaning: "Meaning Builder",
    meaningDesc: "root + suffix + ending",

    evolution: "Word Evolution",
    evolutionDesc: "ev → evim → evimde",

    listenLetter: "Listen Letter",
    listenWord: "Listen Word",
    iKnow: "I know this",
    listen: "Listen",

    buildPrompt: "Build the Turkish meaning",
    tapParts: "Tap parts in the correct order.",
    clear: "Clear",
    check: "Check",
    correctBuild: "Correct! You built a Turkish meaning.",
    tryAgain: "Try again. Suffix order matters.",

    wordGrow: "Watch the word grow",
    understand: "I understand",

    rootNote: "This is the base word. It will later receive suffixes.",

    kidsLogic: "Build the word like blocks.",
    familyLogic: "The suffixes add meaning to the root.",
    adultLogic: "Logic"
  },

  id: {
    subtitle: "Bahasa Turki tidak dihafal kata demi kata. Makna dibangun dari akar kata dan akhiran.",
    chooseLearner: "Pilih pengguna",
    bellaLabel: "Penjelasan bahasa Inggris",
    ayzaLabel: "Penjelasan bahasa Indonesia",
    learningStyleTitle: "Gaya belajar",

    familyOpt: "Mode Keluarga — permainan + logika singkat",
    kidsOpt: "Mode Anak — sangat sederhana",
    adultOpt: "Mode Dewasa — logika lebih lengkap",

    familyPreview: "👨‍👧 Mode Keluarga: permainan dulu, lalu logika singkat. Cocok untuk anak dan orang tua bersama.",
    kidsPreview: "🧒 Mode Anak: penjelasan tata bahasa lebih sedikit, tombol lebih jelas, umpan balik seperti permainan.",
    adultPreview: "🧠 Mode Dewasa: menjelaskan mengapa akhiran digunakan, logika urutan kata, dan catatan tata bahasa singkat.",

    changeLearner: "Ganti pengguna",
    deleteProgress: "Hapus progres",
    homePage: "Halaman Utama",

    positioning: "Kamu tidak menghafal kata. Kamu membangun makna: akar kata + akhiran + akhiran.",

    score: "Skor",
    attempts: "Tes",
    accuracy: "Akurasi",

    pathTitle: "Jalur Makna",
    atMoment: "Saat ini",
    open: "Buka",
    mainMenu: "Halaman Utama",
    next: "Berikutnya",

    alphabet: "Alfabet Pro",
    alphabetDesc: "Bunyi stabil: ı, ö, ü, ş, ç, ğ",

    root: "Akar Kata",
    rootDesc: "Akar kata yang bisa berkembang",

    meaning: "Pembuat Makna",
    meaningDesc: "akar kata + akhiran + akhiran",

    evolution: "Perkembangan Kata",
    evolutionDesc: "ev → evim → evimde",

    listenLetter: "Dengar Huruf",
    listenWord: "Dengar Kata",
    iKnow: "Saya tahu",
    listen: "Dengar",

    buildPrompt: "Bangun makna bahasa Turki",
    tapParts: "Tekan bagian kata dalam urutan yang benar.",
    clear: "Hapus",
    check: "Periksa",
    correctBuild: "Benar! Kamu membangun makna bahasa Turki.",
    tryAgain: "Coba lagi. Urutan akhiran penting.",

    wordGrow: "Lihat kata berkembang",
    understand: "Saya mengerti",

    rootNote: "Ini kata dasar. Nanti kata ini akan menerima akhiran.",

    kidsLogic: "Susun kata seperti blok.",
    familyLogic: "Akhiran menambah makna pada akar kata.",
    adultLogic: "Logika"
  }
};

let learner = localStorage.getItem("tmb_learner") || "";
let style = localStorage.getItem("tmb_style") || "family";
let currentLesson = "meaning";
let index = 0;

let stats = JSON.parse(
  localStorage.getItem("tmb_stats") ||
  '{"score":0,"attempts":0}'
);

let completed = JSON.parse(
  localStorage.getItem("tmb_done") ||
  '{"alphabet":[],"meaning":[]}'
);

const ALPHABET = [
  {
    letter:"e",
    word:"ev",
    en:"house",
    id:"rumah",
    enSound:"e like e in bed",
    idSound:"e seperti e pada enak",
    contrast:"e ≠ i"
  },
  {
    letter:"ı",
    word:"ılık",
    en:"warm",
    id:"hangat",
    enSound:"soft uh, not i",
    idSound:"seperti e pepet, bukan i",
    contrast:"ı ≠ i"
  },
  {
    letter:"ö",
    word:"göz",
    en:"eye",
    id:"mata",
    enSound:"say e while rounding lips",
    idSound:"ucapkan e dengan bibir bulat",
    contrast:"ö ≠ o"
  },
  {
    letter:"ü",
    word:"gül",
    en:"rose",
    id:"mawar",
    enSound:"say ee while rounding lips",
    idSound:"seperti i, tetapi bibir bulat",
    contrast:"ü ≠ u"
  },
  {
    letter:"ş",
    word:"şapka",
    en:"hat",
    id:"topi",
    enSound:"sh like ship",
    idSound:"sy seperti syarat",
    contrast:"ş ≠ ç"
  },
  {
    letter:"ç",
    word:"çay",
    en:"tea",
    id:"teh",
    enSound:"ch like chair",
    idSound:"c seperti cari",
    contrast:"ç ≠ ş"
  },
  {
    letter:"ğ",
    word:"dağ",
    en:"mountain",
    id:"gunung",
    enSound:"soft g, usually stretches the vowel",
    idSound:"tidak dibaca jelas; memanjangkan bunyi",
    contrast:"dağ → daa"
  }
];

const ROOTS = [
  {
    root:"ev",
    en:"house",
    id:"rumah"
  },
  {
    root:"okul",
    en:"school",
    id:"sekolah"
  },
  {
    root:"araba",
    en:"car",
    id:"mobil"
  },
  {
    root:"kitap",
    en:"book",
    id:"buku"
  },
  {
    root:"göz",
    en:"eye",
    id:"mata"
  }
];

const MEANINGS = [
  {
    root:"ev",
    parts:[
      ["ev","root","house","rumah"],
      ["im","suffix","my","saya"],
      ["de","suffix","in / at","di dalam"]
    ],
    result:"evimde",
    en:"in my house",
    id:"di rumah saya",
    adult_en:"Root + possessive + location. The location suffix comes after possession.",
    adult_id:"Akar kata + kepemilikan + tempat. Akhiran tempat datang setelah kepemilikan."
  },
  {
    root:"okul",
    parts:[
      ["okul","root","school","sekolah"],
      ["um","suffix","my","saya"],
      ["da","suffix","in / at","di dalam"]
    ],
    result:"okulumda",
    en:"in my school",
    id:"di sekolah saya",
    adult_en:"The vowel in the suffix changes by vowel harmony: okul + um + da.",
    adult_id:"Vokal pada akhiran berubah sesuai harmoni vokal: okul + um + da."
  },
  {
    root:"araba",
    parts:[
      ["araba","root","car","mobil"],
      ["m","suffix","my","saya"],
      ["dan","suffix","from","dari"]
    ],
    result:"arabamdan",
    en:"from my car",
    id:"dari mobil saya",
    adult_en:"After a vowel-ending root, possession can be -m: araba + m.",
    adult_id:"Jika akar kata berakhir dengan vokal, kepemilikan bisa menjadi -m: araba + m."
  },
  {
    root:"ev",
    parts:[
      ["ev","root","house","rumah"],
      ["im","suffix","my","saya"],
      ["e","suffix","to","ke"]
    ],
    result:"evime",
    en:"to my house",
    id:"ke rumah saya",
    adult_en:"Direction suffix -e/-a means to/towards.",
    adult_id:"Akhiran arah -e/-a berarti ke/menuju."
  },
  {
    root:"okul",
    parts:[
      ["okul","root","school","sekolah"],
      ["um","suffix","my","saya"],
      ["dan","suffix","from","dari"]
    ],
    result:"okulumdan",
    en:"from my school",
    id:"dari sekolah saya",
    adult_en:"Meaning is carried by suffix sequence, not by extra separate words.",
    adult_id:"Makna dibawa oleh urutan akhiran, bukan oleh kata-kata tambahan yang terpisah."
  }
];

function lang(){
  return learner === "ayza" ? "id" : "en";
}

function U(key){
  return UI[lang()][key] || UI.en[key] || key;
}

function meaning(obj){
  return lang() === "id" ? obj.id : obj.en;
}

function setText(id, text){
  const el = document.getElementById(id);
  if(el) el.textContent = text;
}

function localizeStart(){
  setText("subtitle", U("subtitle"));
  setText("chooseLearner", U("chooseLearner"));
  setText("bellaLabel", U("bellaLabel"));
  setText("ayzaLabel", U("ayzaLabel"));
  setText("learningStyleTitle", U("learningStyleTitle"));

  setText("optFamily", U("familyOpt"));
  setText("optKids", U("kidsOpt"));
  setText("optAdult", U("adultOpt"));

  document.getElementById("styleSelect").value = style;
  renderStylePreview();
}

function setStyle(selectedStyle){
  style = selectedStyle;
  localStorage.setItem("tmb_style", style);
  document.getElementById("styleSelect").value = style;
  renderStylePreview();

  if(learner){
    showHome();
  }
}

function renderStylePreview(){
  const box = document.getElementById("stylePreview");

  if(style === "kids"){
    box.className = "logic kids";
    box.textContent = U("kidsPreview");
  }

  if(style === "adult"){
    box.className = "logic adult";
    box.textContent = U("adultPreview");
  }

  if(style === "family"){
    box.className = "logic";
    box.textContent = U("familyPreview");
  }
}

function chooseLearner(selectedLearner){
  learner = selectedLearner;
  localStorage.setItem("tmb_learner", learner);
  localizeStart();
  showHome();
}

function backToStart(){
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("lessonPage").classList.add("hidden");
  document.getElementById("startPage").classList.remove("hidden");
  localizeStart();
}

function showHome(){
  document.getElementById("startPage").classList.add("hidden");
  document.getElementById("lessonPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");

  setText("changeLearner", U("changeLearner"));
  setText("deleteProgress", U("deleteProgress"));

  setText(
    "mainTitle",
    (learner === "ayza" ? "Ayza — " : "Bella — ") + U("homePage")
  );

  setText("scoreLabel", U("score"));
  setText("attemptsLabel", U("attempts"));
  setText("accuracyLabel", U("accuracy"));
  setText("pathTitle", U("pathTitle"));
  setText("mainMenuBtn", U("mainMenu"));
  setText("nextBtn", U("next"));

  document.getElementById("positioning").textContent = U("positioning");

  document.getElementById("modeInfo").innerHTML =
    `<span class="mode-pill">${learner === "ayza" ? "Ayza / Indonesia" : "Bella / English"}</span>
     <span class="mode-pill">${style}</span>
     <span class="mode-pill">root + suffix</span>`;

  renderPath();
  updateProgress();
}

function renderPath(){
  const lessons = [
    [
      "alphabet",
      U("alphabet"),
      U("alphabetDesc"),
      completed.alphabet.length,
      ALPHABET.length
    ],
    [
      "root",
      U("root"),
      U("rootDesc"),
      0,
      ROOTS.length
    ],
    [
      "meaning",
      U("meaning"),
      U("meaningDesc"),
      completed.meaning.length,
      MEANINGS.length
    ],
    [
      "evolution",
      U("evolution"),
      U("evolutionDesc"),
      completed.meaning.length,
      MEANINGS.length
    ]
  ];

  const box = document.getElementById("pathBox");

  box.innerHTML = lessons.map((lesson, i) => {
    const percent = Math.min(
      100,
      Math.round((lesson[3] / Math.max(1, lesson[4])) * 100)
    );

    return `
      <div class="path-card ${percent === 100 ? "done" : i === 0 ? "current" : ""}">
        <div class="path-title">${lesson[1]}</div>
        <div class="path-desc">${lesson[2]}</div>

        <span class="mode-pill">${U("atMoment")}</span>
        <span class="mode-pill">${percent}%</span>

        <div class="progress">
          <div class="bar" style="width:${percent}%"></div>
        </div>

        <button class="primary" style="width:100%;margin-top:12px" onclick="openLesson('${lesson[0]}')">
          ${U("open")}
        </button>
      </div>
    `;
  }).join("");
}

function openLesson(type){
  currentLesson = type;
  index = 0;

  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("lessonPage").classList.remove("hidden");

  setText("mainMenuBtn", U("mainMenu"));
  setText("nextBtn", U("next"));

  renderLesson();
}

function renderLesson(){
  if(currentLesson === "alphabet") renderAlphabet();
  if(currentLesson === "root") renderRoot();
  if(currentLesson === "meaning") renderMeaning();
  if(currentLesson === "evolution") renderEvolution();
}

function nextItem(){
  index++;

  const max =
    currentLesson === "alphabet" ? ALPHABET.length :
    currentLesson === "root" ? ROOTS.length :
    MEANINGS.length;

  if(index >= max){
    index = 0;
  }

  renderLesson();
}

function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "tr-TR";
  utterance.rate = .75;

  speechSynthesis.speak(utterance);
}

function shuffle(array){
  return [...array].sort(() => Math.random() - .5);
}

function mark(type, id){
  if(!completed[type]){
    completed[type] = [];
  }

  if(!completed[type].includes(id)){
    completed[type].push(id);
  }

  localStorage.setItem("tmb_done", JSON.stringify(completed));

  stats.score++;
  stats.attempts++;

  localStorage.setItem("tmb_stats", JSON.stringify(stats));

  updateProgress();
  renderPath();
}

function updateProgress(){
  const alphabetPercent = Math.min(
    100,
    Math.round((completed.alphabet.length / ALPHABET.length) * 100)
  );

  const meaningPercent = Math.min(
    100,
    Math.round((completed.meaning.length / MEANINGS.length) * 100)
  );

  const totalPercent = Math.min(
    100,
    Math.round(
      ((completed.alphabet.length + completed.meaning.length) /
      (ALPHABET.length + MEANINGS.length)) * 100
    )
  );

  const accuracy = stats.attempts
    ? Math.round((stats.score / stats.attempts) * 100)
    : 0;

  setText("score", stats.score);
  setText("attempts", stats.attempts);
  setText("accuracy", accuracy + "%");

  document.getElementById("bar").style.width = totalPercent + "%";
}

function modeExplanation(item){
  if(style === "kids"){
    return `<div class="logic kids">🎮 ${U("kidsLogic")}</div>`;
  }

  if(style === "family"){
    return `
      <div class="logic">
        🧩 ${item.parts.map(part => part[0]).join(" + ")} = <b>${item.result}</b><br>
        ${U("familyLogic")}
      </div>
    `;
  }

  const adultText = lang() === "id" ? item.adult_id : item.adult_en;

  return `
    <div class="logic adult">
      <b>${U("adultLogic")}:</b><br>
      ${item.parts.map(part => `${part[0]} = ${lang() === "id" ? part[3] : part[2]}`).join("<br>")}
      <br><br>
      ${adultText}
    </div>
  `;
}

function renderAlphabet(){
  const item = ALPHABET[index];

  setText("lessonTitle", U("alphabet"));

  document.getElementById("activity").innerHTML = `
    <div class="big">${item.letter}</div>

    <div class="meaning">${item.word} = ${meaning(item)}</div>

    <div class="logic ${style === "kids" ? "kids" : style === "adult" ? "adult" : ""}">
      ${lang() === "id" ? item.idSound : item.enSound}<br>
      <b>${item.contrast}</b>
    </div>

    <div class="row">
      <button class="primary" onclick="speak('${item.letter}')">${U("listenLetter")}</button>
      <button class="primary" onclick="speak('${item.word}')">${U("listenWord")}</button>
    </div>

    <div class="row">
      <button class="success" onclick="mark('alphabet','${item.word}')">${U("iKnow")}</button>
      <button class="warning" onclick="nextItem()">${U("next")}</button>
    </div>
  `;
}

function renderRoot(){
  const item = ROOTS[index];

  setText("lessonTitle", U("root"));

  document.getElementById("activity").innerHTML = `
    <div class="big">${item.root}</div>

    <div class="meaning">${meaning(item)}</div>

    <div class="logic ${style === "kids" ? "kids" : style === "adult" ? "adult" : ""}">
      ${U("rootNote")}
    </div>

    <div class="row">
      <button class="primary" onclick="speak('${item.root}')">${U("listen")}</button>
      <button class="warning" onclick="nextItem()">${U("next")}</button>
    </div>
  `;
}

function renderMeaning(){
  const item = MEANINGS[index];

  setText("lessonTitle", U("meaning"));

  const options = shuffle(item.parts);

  window.currentAnswer = [];

  document.getElementById("activity").innerHTML = `
    <div class="prompt">${U("buildPrompt")}</div>

    <div class="meaning">${meaning(item)}</div>

    <div id="answer" class="big"></div>

    <div class="grid3">
      ${options.map(part => `
        <button class="${part[1] === "root" ? "success" : "warning"}" onclick="pickPart('${part[0]}')">
          ${part[0]}
        </button>
      `).join("")}
    </div>

    <div class="row">
      <button class="danger" onclick="renderMeaning()">${U("clear")}</button>
      <button class="primary" onclick="checkBuild('${item.result}')">${U("check")}</button>
    </div>

    ${modeExplanation(item)}

    <div id="fb" class="feedback">${U("tapParts")}</div>
  `;
}

function pickPart(part){
  window.currentAnswer.push(part);
  document.getElementById("answer").textContent = window.currentAnswer.join("");
}

function checkBuild(correct){
  const given = window.currentAnswer.join("");
  const ok = given === correct;

  stats.attempts++;

  if(ok){
    stats.score++;
  }

  localStorage.setItem("tmb_stats", JSON.stringify(stats));

  const feedback = document.getElementById("fb");

  feedback.textContent = ok ? U("correctBuild") : U("tryAgain");
  feedback.style.background = ok ? "#dcfce7" : "#fee2e2";
  feedback.style.color = ok ? "#166534" : "#991b1b";

  if(ok){
    speak(correct);

    if(!completed.meaning.includes(correct)){
      completed.meaning.push(correct);
    }

    localStorage.setItem("tmb_done", JSON.stringify(completed));
  }

  updateProgress();
}

function renderEvolution(){
  const item = MEANINGS[index];

  setText("lessonTitle", U("evolution"));

  let steps = [item.parts[0][0]];

  if(item.parts.length > 1){
    steps.push(item.parts[0][0] + item.parts[1][0]);
  }

  steps.push(item.result);

  document.getElementById("activity").innerHTML = `
    <div class="prompt">${U("wordGrow")}</div>

    <div class="big">${steps.join(" → ")}</div>

    <div class="meaning">${meaning(item)}</div>

    ${modeExplanation(item)}

    <table class="table">
      ${item.parts.map(part => `
        <tr>
          <td>${part[0]}</td>
          <td>${lang() === "id" ? part[3] : part[2]}</td>
        </tr>
      `).join("")}
    </table>

    <div class="row">
      <button class="primary" onclick="speak('${item.result}')">${U("listen")}</button>
      <button class="success" onclick="mark('meaning','${item.result}')">${U("understand")}</button>
    </div>
  `;
}

function deleteProgress(){
  completed = {
    alphabet: [],
    meaning: []
  };

  stats = {
    score: 0,
    attempts: 0
  };

  localStorage.setItem("tmb_done", JSON.stringify(completed));
  localStorage.setItem("tmb_stats", JSON.stringify(stats));

  showHome();
}

localizeStart();

if(learner){
  showHome();
}
</script>

</body>
</html>
